const local = {
  get(k) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch (e) { return null; } },
  set(k, v) { try { v == null ? localStorage.removeItem(k) : localStorage.setItem(k, JSON.stringify(v)); } catch (e) {} },
  list(prefix) { const o = []; for (let i = 0; i < localStorage.length; i++) { const key = localStorage.key(i); if (key && key.startsWith(prefix)) o.push(key); } return o; },
};
const store = {
  async get(path) {
    if (db) { try { const s = await db.ref(path).get(); return s.exists() ? s.val() : null; } catch (e) { return null; } }
    return local.get("db/" + path);
  },
  async set(path, val) {
    if (db) { try { await db.ref(path).set(val); return true; } catch (e) { return false; } }
    local.set("db/" + path, val); return true;
  },
  async delete(path) {
    if (db) { try { await db.ref(path).remove(); return true; } catch (e) { return false; } }
    local.list("db/" + path).forEach((k) => local.set(k, null)); return true;
  },
  async listChildren(path) {
    if (db) { try { const s = await db.ref(path).get(); return s.exists() ? Object.keys(s.val()) : []; } catch (e) { return []; } }
    const pre = "db/" + path + "/";
    return local.list(pre).map((k) => k.slice(pre.length).split("/")[0]).filter((v, i, a) => a.indexOf(v) === i);
  },
};

const sign = (n) => (n > 0 ? 1 : n < 0 ? -1 : 0);

// horaires en heure de Paris (UTC+2 en été) -> instant du coup d'envoi
function kickoffMs(m) {
  const [y, mo, d] = m.date.split("-").map(Number);
  const [hh, mm] = m.time.split(":").map(Number);
  return Date.UTC(y, mo - 1, d, hh - 2, mm);
}
const LOCK_MS = 15 * 60 * 1000;     // fermeture 15 min avant le coup d'envoi
const MATCH_MS = 2 * 3600 * 1000;   // durée approximative d'un match
const FIRST_KICKOFF = Math.min(...ALL_MATCHES.map(kickoffMs));

// statut d'un match : up (modifiable) | closed (verrouillé <15min) | live | past
function displayStatus(m, now, globalLocked) {
  const k = kickoffMs(m);
  if (now >= k + MATCH_MS) return "past";
  if (now >= k) return "live";
  if (globalLocked || now >= k - LOCK_MS) return "closed";
  return "up";
}

/* ------------------------------------------------------------------ */
/*  SCORE                                                             */
/* ------------------------------------------------------------------ */
function scorePlayer(pred, res, rules) {
  if (!res) return { total: 0, matches: 0, run: 0, exact: 0, results: 0 };
  let mPts = 0, exact = 0, results = 0;
  ALL_MATCHES.forEach((m) => {
    const r = res.matches?.[m.id];
    const p = pred.matches?.[m.id];
    if (!r || r.a === "" || r.b === "" || !p || p.a === "" || p.b === "") return;
    const ra = +r.a, rb = +r.b, pa = +p.a, pb = +p.b;
    if (pa === ra && pb === rb) { mPts += rules.exact; exact++; }
    else if (sign(pa - pb) === sign(ra - rb)) { mPts += rules.result; results++; }
  });
  // matchs à élimination directe (score exact / bon résultat, mêmes barèmes)
  const ko = res.ko || {};
  Object.keys(ko).forEach((id) => {
    const r = ko[id], p = pred.ko?.[id];
    if (!r || r.sa == null || r.sa === "" || r.sb == null || r.sb === "") return;
    if (!p || p.sa === "" || p.sb === "" || p.sa == null || p.sb == null) return;
    const ra = +r.sa, rb = +r.sb, pa = +p.sa, pb = +p.sb;
    if (pa === ra && pb === rb) { mPts += rules.exact; exact++; }
    else if (sign(pa - pb) === sign(ra - rb)) { mPts += rules.result; results++; }
  });
  let rPts = 0;
  const cnt = (predArr, realArr, pts) =>
    (predArr || []).reduce((s, t) => s + ((realArr || []).includes(t) ? pts : 0), 0);
  rPts += cnt(pred.run?.quart, res.run?.quart, rules.quart);
  rPts += cnt(pred.run?.demi, res.run?.demi, rules.demi);
  rPts += cnt(pred.run?.finaliste, res.run?.finaliste, rules.finaliste);
  if (pred.run?.champion && pred.run.champion === res.run?.champion) rPts += rules.champion;
  return { total: mPts + rPts, matches: mPts, run: rPts, exact, results };
}

const GCOL = ["#ff2d6f", "#7b4dff", "#1f9e75", "#e0820f", "#2f6df0", "#d6386a",
  "#0fb0a4", "#9b3df0", "#e85d1f", "#3aa0ff", "#c41d8a", "#5a8c00"];

/* ------------------------------------------------------------------ */
/*  COMPOSANT PRINCIPAL                                                */
/* ------------------------------------------------------------------ */
function App() {
  const [me, setMe] = useState(null);          // {name, groups:[{code,pid,gname}], active}
  const [meta, setMeta] = useState(null);
  const [results, setResults] = useState(null);
  const [pred, setPred] = useState(emptyPred());
  const [tab, setTab] = useState("pronos");
  const [booting, setBooting] = useState(true);
  const [adding, setAdding] = useState(false);

  const pidOf = (m, code) => m?.groups?.find((g) => g.code === code)?.pid;

  // migration depuis l'ancien format {id,name,code}
  const migrate = (saved) => {
    if (!saved) return null;
    if (saved.groups) return saved;
    if (saved.code) return { name: saved.name, groups: [{ code: saved.code, pid: saved.id, gname: "" }], active: saved.code };
    return null;
  };

  useEffect(() => {
    (async () => {
      const saved = migrate(local.get(MEKEY));
      if (saved && saved.groups && saved.groups.length && saved.active) {
        const mem = saved.groups.find((g) => g.code === saved.active) || saved.groups[0];
        const m = await store.get(KEY.meta(mem.code));
        if (m) { setMe({ ...saved, active: mem.code }); await loadGroup(mem.code, mem.pid); }
        else { setMe(saved); }
      }
      setBooting(false);
    })();
  }, []);

  async function loadGroup(code, pid) {
    const [m, r, p] = await Promise.all([
      store.get(KEY.meta(code)),
      store.get(KEY.results(code)),
      store.get(KEY.player(code, pid)),
    ]);
    setMeta(m);
    setResults(r || emptyResults());
    setPred(p?.pred || emptyPred());
  }

  async function createGroup(name, gname) {
    try {
      const code = randCode();
      const id = randId();
      const m = { name: gname || "Mon groupe", admin: id, rules: { ...DEFAULT_RULES }, created: Date.now() };
      const r = emptyResults();
      await store.set(KEY.meta(code), m);
      await store.set(KEY.results(code), r);
      await store.set(KEY.player(code, id), { name, pred: emptyPred(), joined: Date.now() });
      setMe((prev) => {
        const base = prev || { name, groups: [], active: null };
        const groups = [...base.groups.filter((g) => g.code !== code), { code, pid: id, gname: m.name }];
        const next = { name: name || base.name, groups, active: code };
        local.set(MEKEY, next);
        return next;
      });
      setMeta(m); setResults(r); setPred(emptyPred()); setTab("pronos"); setAdding(false);
    } catch (e) { console.error("createGroup", e); }
  }

  async function joinGroup(name, code) {
    code = code.trim().toUpperCase();
    const m = await store.get(KEY.meta(code));
    if (!m) return false;
    let pid = pidOf(me, code);
    let existing = null;
    if (pid) existing = await store.get(KEY.player(code, pid));
    if (!pid) { pid = randId(); await store.set(KEY.player(code, pid), { name, pred: emptyPred(), joined: Date.now() }); }
    const r = await store.get(KEY.results(code));
    setMe((prev) => {
      const base = prev || { name, groups: [], active: null };
      const groups = base.groups.some((g) => g.code === code) ? base.groups : [...base.groups, { code, pid, gname: m.name }];
      const next = { name: name || base.name, groups, active: code };
      local.set(MEKEY, next);
      return next;
    });
    setMeta(m);
    setResults(r || emptyResults());
    setPred(existing?.pred || emptyPred());
    setTab("pronos"); setAdding(false);
    return true;
  }

  async function switchGroup(code) {
    if (!me || code === me.active) return;
    const pid = pidOf(me, code);
    const next = { ...me, active: code };
    setMe(next); local.set(MEKEY, next);
    await loadGroup(code, pid);
    setTab("pronos");
  }

  async function leaveGroup() {
    const code = me.active;
    const groups = me.groups.filter((g) => g.code !== code);
    if (groups.length) {
      const next = { ...me, groups, active: groups[0].code };
      setMe(next); local.set(MEKEY, next);
      await loadGroup(groups[0].code, groups[0].pid);
      setTab("pronos");
    } else {
      local.set(MEKEY, null);
      setMe(null); setMeta(null); setResults(null); setPred(emptyPred());
    }
  }

  async function deleteGroup() {
    const code = me.active;
    await store.delete(KEY.group(code));
    const groups = me.groups.filter((g) => g.code !== code);
    if (groups.length) {
      const next = { ...me, groups, active: groups[0].code };
      setMe(next); local.set(MEKEY, next);
      await loadGroup(groups[0].code, groups[0].pid);
      setTab("pronos");
    } else {
      local.set(MEKEY, null);
      setMe(null); setMeta(null); setResults(null); setPred(emptyPred());
    }
  }

  if (booting) return <Boot />;
  if (!me || adding || !meta)
    return <><style>{CSS}</style>
      <Welcome onCreate={createGroup} onJoin={joinGroup}
        existingName={me?.name} canCancel={!!(me && meta)} onCancel={() => setAdding(false)} />
    </>;

  const activeCode = me.active;
  const activePid = pidOf(me, activeCode);
  const isAdmin = meta.admin === activePid;

  async function savePred() {
    const existing = await store.get(KEY.player(activeCode, activePid));
    await store.set(KEY.player(activeCode, activePid), { ...(existing || {}), name: existing?.name, pred });
  }

  return (
    <div className="wc">
      <style>{CSS}</style>
      <Hero meta={meta} />
      <div className="wrap">
        <TopBar me={me} meta={meta} onSwitch={switchGroup} onAdd={() => setAdding(true)} onLeave={leaveGroup} />
        {!online && <div className="warn">{OFFLINE_MSG}</div>}
        {tab === "pronos" && (
          <GroupPronos pred={pred} setPred={setPred} results={results} onSave={savePred} />
        )}
        {tab === "parcours" && (
          <Parcours pred={pred} setPred={setPred} results={results} onSave={savePred} />
        )}
        {tab === "finale" && (
          <Finale pred={pred} setPred={setPred} results={results} onSave={savePred} />
        )}
        {tab === "classement" && (
          <Classement code={activeCode} meId={activePid} rules={meta.rules} results={results} />
        )}
        {tab === "resultats" && (
          <Resultats code={activeCode} isAdmin={isAdmin} meta={meta} setMeta={setMeta}
            results={results} setResults={setResults} onDelete={deleteGroup} />
        )}
        {tab === "partage" && <Partage code={activeCode} meta={meta} />}
      </div>
      <Tabs tab={tab} setTab={setTab} isAdmin={isAdmin} />
    </div>
  );
}

function Boot() {
  return (
    <div className="wc"><style>{CSS}</style>
      <div style={{ display: "grid", placeItems: "center", minHeight: "60vh", color: "var(--mut)" }}>
        <div className="disp" style={{ fontSize: 22, color: "var(--mag)" }}>Chargement…</div>
      </div>
    </div>
  );
}

      <div className="inner">
        <div className="kick"><b>★</b> Pronostics <b>★</b> Coupe du Monde 2026</div>
        <div className="htitle disp">Le grand <span className="pink">prono</span></div>
        <div className="hsub">USA · Canada · Mexique — 48 équipes, 12 groupes, un seul gagnant dans ton groupe.</div>
        <div className="gband">
          <span className="pill">📅 <b>11 juin → 19 juillet</b></span>
          <span className="pill">🏟️ <b>{meta.name}</b></span>

/* --------------------------- WELCOME ---------------------------- */
function Welcome({ onCreate, onJoin, existingName, canCancel, onCancel }) {
  const [mode, setMode] = useState("home");
  const [name, setName] = useState(existingName || "");
  const [gname, setGname] = useState("");
  const [code, setCode] = useState("");
  const [err, setErr] = useState("");

  return (
    <div className="wc">
      <div className="hero"><div className="blob" /><div className="inner">
        <div className="kick"><b>★</b> Pronostics <b>★</b> Coupe du Monde 2026</div>
        <div className="htitle disp">Le grand <span className="pink">prono</span></div>
        <div className="hsub">Crée un groupe, invite tes amis, pronostique tout le tournoi — du premier match à la finale.</div>
      </div></div>
      <div className="wrap"><div className="center">
        {mode === "home" && (
          <div className="card">
            {!online && <div className="warn" style={{ marginTop: 0 }}>{OFFLINE_MSG}</div>}
            <h2>{canCancel ? "Ajouter un groupe" : "On y va"}</h2>
            <p className="lead">{canCancel ? "Crée un nouveau groupe ou rejoins-en un autre — tu pourras passer de l'un à l'autre à tout moment." : "Lance ton propre groupe de pronostics, ou rejoins celui d'un ami avec son code."}</p>
            <button className="btn pri" onClick={() => { setErr(""); setMode("create"); }}>Créer un groupe</button>
            <div className="or">ou</div>
            <button className="btn ghost" onClick={() => { setErr(""); setMode("join"); }}>Rejoindre avec un code</button>
            {canCancel && <><div style={{ height: 14 }} /><button className="btn ghost" onClick={onCancel}>← Retour à mes groupes</button></>}
          </div>
        )}
        {mode === "create" && (
          <div className="card">
            <h2>Créer un groupe</h2>
            <p className="lead">Tu seras l'organisateur : c'est toi qui choisis les règles de points et qui saisis les résultats.</p>
            <label className="fl">Ton pseudo</label>
            <input className="txt" value={name} onChange={(e) => setName(e.target.value)} placeholder="Ex. Romain" maxLength={24} />
            <div style={{ height: 12 }} />
            <label className="fl">Nom du groupe</label>
            <input className="txt" value={gname} onChange={(e) => setGname(e.target.value)} placeholder="Ex. Les potos du Mondial" maxLength={32} />
            {err && <div className="err">{err}</div>}
            <div style={{ height: 16 }} />
            <button className="btn pri" onClick={() => {
              if (!name.trim()) return setErr("Mets un pseudo.");
              onCreate(name.trim(), gname.trim());
            }}>Créer et commencer</button>
            <div style={{ height: 8 }} />
            <button className="btn ghost" onClick={() => setMode("home")}>Retour</button>
          </div>
        )}
        {mode === "join" && (
          <div className="card">
            <h2>Rejoindre un groupe</h2>
            <p className="lead">Demande son code à 6 lettres à la personne qui a créé le groupe.</p>
            <label className="fl">Ton pseudo</label>
            <input className="txt" value={name} onChange={(e) => setName(e.target.value)} placeholder="Ex. Léa" maxLength={24} />
            <div style={{ height: 12 }} />
            <label className="fl">Code du groupe</label>
            <input className="txt" value={code} onChange={(e) => setCode(e.target.value.toUpperCase())}
              placeholder="Ex. K7P2QX" maxLength={6} style={{ fontFamily: "Anton", letterSpacing: ".1em", fontSize: 18 }} />
            {err && <div className="err">{err}</div>}
            <div style={{ height: 16 }} />
            <button className="btn pri" onClick={async () => {
              if (!name.trim()) return setErr("Mets un pseudo.");
              if (code.trim().length < 4) return setErr("Code trop court.");
              const ok = await onJoin(name.trim(), code);
              if (!ok) setErr("Aucun groupe trouvé avec ce code.");
            }}>Rejoindre</button>
            <div style={{ height: 8 }} />
            <button className="btn ghost" onClick={() => setMode("home")}>Retour</button>
          </div>
        )}
      </div></div>
    </div>
  );
}

/* ---------------------------- PRONOS ---------------------------- */
function useNow(ms = 60000) {
  const [now, setNow] = useState(Date.now());
  useEffect(() => { const id = setInterval(() => setNow(Date.now()), ms); return () => clearInterval(id); }, [ms]);
  return now;
}
function MatchBadge({ status }) {
  if (status === "live") return <span className="badge live"><span className="dot" />En direct</span>;
  if (status === "past") return <span className="badge past">Terminé</span>;
  if (status === "closed") return <span className="badge closed">🔒 Fermé</span>;
  return <span className="badge up">À venir</span>;
}

function SaveBar({ onSave, locked }) {
  const [saved, setSaved] = useState(false);
  const [busy, setBusy] = useState(false);
  if (locked) return null;
  return (
    <div className="savebar">
      <button className="btn pri" onClick={async () => {
        setBusy(true); await onSave(); setBusy(false);
        setSaved(true); setTimeout(() => setSaved(false), 2500);
      }}>{busy ? "Enregistrement…" : "Enregistrer mes pronostics"}</button>
      {saved && <div className="saved">✓ Pronostics enregistrés — visibles dans le classement</div>}
    </div>
  );
}

/* ----- Onglet GROUPES : scores de la phase de groupes ----- */
function GroupPronos({ pred, setPred, results, onSave }) {
  const now = useNow();
  const locked = results?.locked;

  const setMatch = (mid, side, val) => {
    const m = ALL_MATCHES.find((x) => x.id === mid);
    if (!m || displayStatus(m, now, locked) !== "up") return;
    val = val.replace(/[^0-9]/g, "").slice(0, 2);
    setPred((p) => ({ ...p, matches: { ...p.matches, [mid]: { ...(p.matches[mid] || { a: "", b: "" }), [side]: val } } }));
  };

  const filled = ALL_MATCHES.filter((m) => { const p = pred.matches[m.id]; return p && p.a !== "" && p.b !== ""; }).length;

  return (
    <div>
      {locked && <div className="warn">🔒 Les pronostics sont verrouillés par l'organisateur. Tu peux suivre le classement.</div>}
      <div className="sec-h"><h3>Phase de groupes</h3><span className="n">{filled}/72 matchs</span></div>
      <div className="miniprog"><i style={{ width: `${(filled / 72) * 100}%` }} /></div>
      <div className="pickhint" style={{ margin: "7px 2px 0" }}>🕐 Horaires en heure de Paris. Les pronos d'un match se ferment <b>15 min avant</b> le coup d'envoi.</div>
      <div style={{ height: 12 }} />
      {LETTERS.map((L, gi) => {
        const ms = groupMatches(L);
        const gfilled = ms.filter((m) => { const p = pred.matches[m.id]; return p && p.a !== "" && p.b !== ""; }).length;
        return (
          <details className="gblock" key={L} open={gi === 0}>
            <summary>
              <span className="gletter" style={{ background: GCOL[gi] }}>{L}</span>
              <span className="gsum-t">
                <span className="gt">Groupe {L}</span>
                <span className="gm">{GROUPS[L].map((t) => t[1]).join(" ")} · {gfilled}/6 remplis</span>
              </span>
              <span className="chev">▸</span>
            </summary>
            <div className="gbody">
              {ms.map((m) => {
                const p = pred.matches[m.id] || { a: "", b: "" };
                const st = displayStatus(m, now, locked);
                const editable = st === "up";
                return (
                  <React.Fragment key={m.id}>
                    <div className="match-meta"><span className="t">{fmtDate(m.date)}</span> · {m.time}<MatchBadge status={st} /></div>
                    <div className="match">
                      <span className="tm r"><span className="nm">{m.a}</span><span className="fg">{FLAG[m.a]}</span></span>
                      <span className="score">
                        <input inputMode="numeric" value={p.a} onChange={(e) => setMatch(m.id, "a", e.target.value)} disabled={!editable} />
                        <span className="dash">–</span>
                        <input inputMode="numeric" value={p.b} onChange={(e) => setMatch(m.id, "b", e.target.value)} disabled={!editable} />
                      </span>
                      <span className="tm"><span className="fg">{FLAG[m.b]}</span><span className="nm">{m.b}</span></span>
                    </div>
                  </React.Fragment>
                );
              })}
            </div>
          </details>
        );
      })}
      <SaveBar onSave={onSave} locked={locked} />
    </div>
  );
}

/* ----- Onglet PARCOURS : le pari global de phase finale (au démarrage) ----- */
function Parcours({ pred, setPred, results, onSave }) {
  const now = useNow();
  const locked = results?.locked;
  const runLocked = locked || now >= FIRST_KICKOFF - LOCK_MS;

  const togglePick = (round, team, max) => {
    if (runLocked) return;
    setPred((p) => {
      const cur = p.run[round] || [];
      let next;
      if (cur.includes(team)) next = cur.filter((t) => t !== team);
      else { if (cur.length >= max) return p; next = [...cur, team]; }
      return { ...p, run: { ...p.run, [round]: next } };
    });
  };
  const setChampion = (team) => {
    if (runLocked) return;
    setPred((p) => ({ ...p, run: { ...p.run, champion: team } }));
  };

  return (
    <div>
      <div className="sec-h"><h3>Le parcours final</h3><span className="n">pari du démarrage</span></div>
      <div className="pickhint" style={{ margin: "0 2px 10px" }}>Désigne les équipes qui iront loin dans le tableau. Ce pari global se fige au coup d'envoi du tournoi (11 juin).</div>
      <RunPicker pred={pred} togglePick={togglePick} setChampion={setChampion} locked={runLocked} />
      <SaveBar onSave={onSave} locked={runLocked} />
    </div>
  );
}

/* ----- Onglet FINALE : scores des matchs à élimination directe (au fil du tournoi) ----- */
function Finale({ pred, setPred, results, onSave }) {
  const now = useNow();
  const locked = results?.locked;
  const ko = results?.ko || {};

  const setKo = (id, side, val) => {
    const km = KO_BY_ID[id];
    const teamsSet = ko[id]?.a && ko[id]?.b;
    if (!teamsSet || displayStatus(km, now, locked) !== "up") return;
    val = val.replace(/[^0-9]/g, "").slice(0, 2);
    setPred((p) => ({ ...p, ko: { ...p.ko, [id]: { ...(p.ko?.[id] || { sa: "", sb: "" }), [side]: val } } }));
  };

  const revealed = KNOCKOUT.filter((m) => ko[m.id]?.a && ko[m.id]?.b).length;

  return (
    <div>
      {locked && <div className="warn">🔒 Les pronostics sont verrouillés par l'organisateur.</div>}
      <div className="sec-h"><h3>Tableau final</h3><span className="n">{revealed}/32 affiches</span></div>
      <div className="pickhint" style={{ margin: "0 2px 10px" }}>Les affiches s'affichent dès que l'organisateur connaît les qualifiés. Pronostique le score (prolongation / t.a.b. inclus). Fermeture 15 min avant le coup d'envoi.</div>

      {KO_ROUNDS.map(([rid, rlabel]) => {
        const ms = KNOCKOUT.filter((m) => m.round === rid);
        return (
          <div className="gblock" key={rid} style={{ padding: "4px 13px 10px" }}>
            <div className="ko-h">{rlabel}</div>
            {ms.map((m) => {
              const k = ko[m.id] || {};
              const teamsSet = k.a && k.b;
              const p = pred.ko?.[m.id] || { sa: "", sb: "" };
              const st = displayStatus(m, now, locked);
              const editable = teamsSet && st === "up";
              return (
                <React.Fragment key={m.id}>
                  <div className="match-meta"><span className="t">{fmtDate(m.date)}</span> · {m.time}<MatchBadge status={st} /></div>
                  {teamsSet ? (
                    <div className="match">
                      <span className="tm r"><span className="nm">{k.a}</span><span className="fg">{FLAG[k.a]}</span></span>
                      <span className="score">
                        <input inputMode="numeric" value={p.sa} onChange={(e) => setKo(m.id, "sa", e.target.value)} disabled={!editable} />
                        <span className="dash">–</span>
                        <input inputMode="numeric" value={p.sb} onChange={(e) => setKo(m.id, "sb", e.target.value)} disabled={!editable} />
                      </span>
                      <span className="tm"><span className="fg">{FLAG[k.b]}</span><span className="nm">{k.b}</span></span>
                    </div>
                  ) : (
                    <div className="ko-tbd">{m.label} · <span className="muted">affiche à venir</span></div>
                  )}
                </React.Fragment>
              );
            })}
          </div>
        );
      })}
      <SaveBar onSave={onSave} locked={locked} />
    </div>
  );
}

/* -------------------------- CLASSEMENT -------------------------- */
function Classement({ code, meId, rules, results }) {
  const [rows, setRows] = useState(null);

  const load = useCallback(async () => {
    const pids = await store.listChildren(KEY.players(code));
    const players = await Promise.all(pids.map((pid) => store.get(KEY.player(code, pid)).then((v) => ({ id: pid, ...(v || {}) }))));
    const scored = players.filter((p) => p && p.name).map((p) => {
      const s = scorePlayer(p.pred || emptyPred(), results, rules);
      return { id: p.id, name: p.name, ...s };
    }).sort((a, b) => b.total - a.total || b.exact - a.exact);
    setRows(scored);
  }, [code, results, rules]);

  useEffect(() => { load(); const iv = setInterval(load, 15000); return () => clearInterval(iv); }, [load]);

  const hasResults = results && (Object.keys(results.matches || {}).length || Object.keys(results.ko || {}).length || results.run?.champion);

  return (
    <div>
      <div className="sec-h">
        <h3>Classement du groupe</h3>
        <button className="btn ghost sm" onClick={load}>↻ Actualiser</button>
      </div>
      {!hasResults && (
        <div className="warn">Aucun résultat saisi pour l'instant — le classement passera à zéro jusqu'au coup d'envoi. Les points tombent dès que l'organisateur entre les scores.</div>
      )}
      {rows === null ? <div className="empty">Calcul du classement…</div> :
        rows.length === 0 ? <div className="empty">Personne n'a encore rejoint le groupe.<br />Partage le code pour lancer la partie.</div> :
          <div className="lb">
            {rows.map((r, i) => (
              <div className="lbrow" key={r.id}>
                <span className={"rank" + (i === 0 ? " r1" : i === 1 ? " r2" : i === 2 ? " r3" : "")}>{i + 1}</span>
                <span style={{ flex: 1 }}>
                  <div className={"lbname" + (r.id === meId ? " me" : "")}>
                    {r.name}{r.id === meId && <span className="tagme">toi</span>}
                  </div>
                  <div className="lbsub">{r.exact} scores exacts · {r.results} bons résultats · {r.run} pts parcours</div>
                </span>
                <span className="pts">{r.total}<small>points</small></span>
              </div>
            ))}
          </div>}
      <div style={{ height: 16 }} />
      <div className="note">
        Le classement se met à jour automatiquement (toutes les 15 s) et compte chaque membre du groupe. Si un ami vient de rejoindre, appuie sur <b>Actualiser</b>.
      </div>
    </div>
  );
}

  const [delConfirm, setDelConfirm] = useState(false);
  const now = useNow();

    // vue lecture seule pour les membres

          {Object.keys(RULE_LABELS).map((k) => (

  const setResMatch = async (mid, side, val) => {

    const next = { ...results, run: { ...results.run, [round]: nx } };
    setResults(next); await store.set(KEY.results(code), next);
  };
  const setResChamp = async (team) => {
    const next = { ...results, run: { ...results.run, champion: team } };
    setResults(next); await store.set(KEY.results(code), next);
  };

    const next = { ...meta, rules: { ...meta.rules, [k]: Math.max(0, +String(v).replace(/[^0-9]/g, "") || 0) } };

      )}

      {sub === "finale" && (
        <>
          <div className="warn">Renseigne les deux équipes de chaque affiche dès qu'elles sont connues, puis le score réel. Les joueurs peuvent alors parier sur ce match.</div>
          {KO_ROUNDS.map(([rid, rlabel]) => {
            const ms = KNOCKOUT.filter((m) => m.round === rid);
            return (
              <div className="gblock" key={rid} style={{ padding: "4px 13px 10px" }}>
                <div className="ko-h">{rlabel}</div>
                {ms.map((m) => {
                  const k = (results.ko || {})[m.id] || { a: "", b: "", sa: "", sb: "" };
                  return (
                    <div key={m.id}>
                      <div className="match-meta" style={{ textAlign: "left" }}><span className="t">{m.label}</span> · {fmtDate(m.date)} · {m.time}</div>
                      <div className="korow">
                        <select className="koselect" value={k.a || ""} onChange={(e) => setKoField(m.id, "a", e.target.value)}>
                          <option value="">— Équipe 1 —</option>
                          {TEAMS.map((t) => <option key={t.name} value={t.name}>{t.flag} {t.name}</option>)}
                        </select>
                        <span className="score">
                          <input className="res" inputMode="numeric" value={k.sa} onChange={(e) => setKoField(m.id, "sa", e.target.value)} />
                          <span className="dash">–</span>
                          <input className="res" inputMode="numeric" value={k.sb} onChange={(e) => setKoField(m.id, "sb", e.target.value)} />
                        </span>
                        <select className="koselect" value={k.b || ""} onChange={(e) => setKoField(m.id, "b", e.target.value)}>
                          <option value="">— Équipe 2 —</option>
                          {TEAMS.map((t) => <option key={t.name} value={t.name}>{t.flag} {t.name}</option>)}
                        </select>
                      </div>
                    </div>
                  );
                })}
              </div>
            );
          })}
        </>
      )}
    </div>
  );
}

/* --------------------------- PARTAGE ---------------------------- */
function Partage({ code, meta }) {
  const [copied, setCopied] = useState("");
  const url = typeof window !== "undefined" ? window.location.href : "";

  const copy = async (text, what) => {
    try { await navigator.clipboard.writeText(text); }
    catch (e) { const ta = document.createElement("textarea"); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); ta.remove(); }
    setCopied(what); setTimeout(() => setCopied(""), 2000);
  };
  const invite = `Rejoins notre groupe de pronos pour la Coupe du Monde 2026 !\nGroupe : ${meta.name}\nCode : ${code}\nOuvre le lien et entre le code pour jouer.\n${url}`;

  return (
    <div>
      <div className="sec-h"><h3>Inviter des amis</h3></div>
      <div className="codebox">
        <div className="lab">Code du groupe</div>
        <div className="big">{code}</div>
        <button className="copy" onClick={() => copy(code, "code")}>{copied === "code" ? "✓ Copié" : "Copier le code"}</button>
      </div>
      <button className="btn pri" onClick={() => copy(invite, "invit")}>{copied === "invit" ? "✓ Invitation copiée" : "Copier le message d'invitation"}</button>
      <div style={{ height: 10 }} />
      {url && <button className="btn ghost" onClick={() => copy(url, "lien")}>{copied === "lien" ? "✓ Lien copié" : "Copier le lien du site"}</button>}
      <div style={{ height: 16 }} />
      <div className="note">
        <b>Comment ça marche</b><br />
        1. Envoie le <b>lien de ce site</b> + le <b>code {code}</b> à tes amis.<br />
        2. Chacun ouvre le lien, clique sur « Rejoindre avec un code » et entre <b>{code}</b>.<br />
        3. Tout le monde remplit ses pronos. Le <b>classement</b> est commun et se met à jour en direct.<br /><br />
        Toi seul, en tant qu'organisateur, saisis les vrais résultats dans l'onglet <b>Résultats</b> — c'est ce qui distribue les points.
      </div>
    </div>
  );
}


const _root = document.getElementById("root");
if (ReactDOM.createRoot) { ReactDOM.createRoot(_root).render(<App />); }
else { ReactDOM.render(<App />, _root); }
</script>
</body>
