  // prochains coups d'envoi (matchs de groupe + tableau dont les équipes sont connues)
  const upcoming = [];
  ALL_MATCHES.forEach((m) => { const k = kickoffMs(m); if (k > now) upcoming.push({ kind: "g", m, k, a: m.a, b: m.b }); });
  KNOCKOUT.forEach((m) => { const [ta, tb] = koTeams(m.id, results.ko || {}); if (!ta || !tb) return; const k = kickoffMs(m); if (k > now) upcoming.push({ kind: "k", m, k, a: ta, b: tb }); });
  upcoming.sort((x, y) => x.k - y.k);
  const nextMatches = upcoming.slice(0, 8);
  const matchMsg = (it, miss) =>
    `Pronos CDM 2026 — ${it.a} – ${it.b} (${fmtDate(it.m.date)} ${it.m.time}, ${inText(it.k - now)}). ` +
    (miss.length ? `À compléter : ${miss.map((p) => p.name).join(", ")} 🙏` : "Tout le monde a parié ✓");

  // participation globale
  const stat = (p) => {
    const g = ALL_MATCHES.filter((m) => { const x = p.pred.matches?.[m.id]; return x && full(x.a) && full(x.b); }).length;
    const r = p.pred.run || {};
    const parc = (r.quart || []).length === 8 && (r.demi || []).length === 4 && (r.finaliste || []).length === 2 && !!r.champion;
    const fin = KNOCKOUT.filter((m) => { const t = results.ko?.[m.id]; if (!t || !t.a || !t.b) return false; const x = p.pred.ko?.[m.id]; return x && full(x.sa) && full(x.sb); }).length;
    return { g, parc, fin };
  };
  const rows = players.map((p) => ({ ...p, ...stat(p) }))
    .sort((a, b) => (a.g + (a.parc ? 200 : 0) + a.fin) - (b.g + (b.parc ? 200 : 0) + b.fin));
  const behind = rows.filter((r) => r.g < 72 || !r.parc || (koAvail > 0 && r.fin < koAvail));
  const reminder = behind.length
    ? `Rappel pronos CDM 2026 — groupe « ${groupName} »\nIl manque des pronos pour :\n` + behind.map((r) => {
        const miss = [];
        if (r.g < 72) miss.push(`groupes ${r.g}/72`);
        if (!r.parc) miss.push("parcours incomplet");
        if (koAvail > 0 && r.fin < koAvail) miss.push(`finale ${r.fin}/${koAvail}`);
        return `• ${r.name} : ${miss.join(", ")}`;
      }).join("\n") + `\nPensez à compléter avant les matchs 🙌`
    : `Groupe « ${groupName} » : tout le monde est à jour 🎉`;

  return (
    <div>
      <div className="warn">Tu vois qui a parié (jamais le détail des pronos). En haut : relance ciblée match par match ; en bas : participation globale.</div>

      <div className="sec-h"><h3>Prochains matchs — relance ciblée</h3><button className="btn ghost sm" onClick={load}>↻</button></div>
      {nextMatches.length === 0
        ? <div className="empty">Aucun match à venir pour l'instant.</div>
        : nextMatches.map((it) => {
            const miss = players.filter((p) => !hasPred(p, it));
            const done = players.length - miss.length;
            return (
              <div className="live-match" key={it.kind + it.m.id}>
                <div className="live-head">
                  <span className="live-teams"><span>{FLAG[it.a]} {it.a}</span><span className="vs">vs</span><span>{FLAG[it.b]} {it.b}</span></span>
                  <span className={"stag " + (miss.length === 0 ? "ok" : "todo")}>{done}/{players.length} ✓</span>
                </div>
                <div className="match-meta" style={{ textAlign: "left", paddingTop: 0 }}><span className="t">{fmtDate(it.m.date)}</span> · {it.m.time} · {inText(it.k - now)}<MatchBadge status={displayStatus(it.m, now, locked)} /></div>
                {miss.length === 0
                  ? <div className="allset">Tout le monde a parié ✓</div>
                  : <>
                      <div className="miss-line"><b>{miss.length} à relancer :</b> {miss.map((p) => p.name).join(", ")}</div>
                      <button className="btn ghost sm" style={{ width: "auto", marginTop: 4 }} onClick={() => copyText(matchMsg(it, miss), it.m.id)}>{copied === it.m.id ? "✓ Copié" : "Copier le rappel de ce match"}</button>
                    </>}
              </div>
            );
          })}

      <div className="sec-h"><h3>Participation globale</h3></div>
      <button className="btn pri" onClick={() => copyText(reminder, "global")}>{copied === "global" ? "✓ Rappel copié" : "Copier un rappel global"}</button>
      <div style={{ height: 12 }} />
      <div className="lb">
        {rows.map((r) => (
          <div className="lbrow" key={r.id}>
            <span style={{ flex: 1 }}>
              <div className={"lbname" + (r.id === meId ? " me" : "")}>{r.name}{r.id === meId && <span className="tagme">toi</span>}</div>
              <div className="suivi-tags">
                <span className={"stag " + (r.g >= 72 ? "ok" : "todo")}>Groupes {r.g}/72</span>
                <span className={"stag " + (r.parc ? "ok" : "todo")}>Parcours {r.parc ? "✓" : "à faire"}</span>
                {koAvail > 0 && <span className={"stag " + (r.fin >= koAvail ? "ok" : "todo")}>Finale {r.fin}/{koAvail}</span>}
              </div>
            </span>
            <span className="pts" style={{ fontSize: 19 }}>{Math.round((r.g / 72) * 100)}<small>% groupes</small></span>
            {r.id !== meId && (
              confirmId === r.id ? (
                <span style={{ display: "flex", gap: 4, alignItems: "center", flex: "none" }}>
                  <button className="btn pri sm" style={{ background: "var(--mag2)", padding: "5px 9px", width: "auto" }} onClick={() => removePlayer(r.id)}>Retirer</button>
                  <button className="btn ghost sm" style={{ padding: "5px 8px", width: "auto" }} onClick={() => setConfirmId("")}>×</button>
                </span>
              ) : (
                <button className="btn ghost sm" title="Retirer ce joueur du groupe" style={{ padding: "5px 9px", width: "auto", color: "var(--mag2)", borderColor: "var(--tintbd)", flex: "none" }} onClick={() => setConfirmId(r.id)}>✕</button>
              )
            )}
          </div>
        ))}
      </div>

      <div className="sec-h" style={{ marginTop: 22 }}><h3>Joueur IA — Claude 🤖</h3></div>
      <div className="pickhint" style={{ margin: "0 2px 10px" }}>Ajoute un participant IA, clairement identifié, avec un jeu complet de pronos (72 matchs générés selon la force des équipes + le parcours). Écriture directe : non soumise au verrou d'horaire.</div>
      <button className="btn pri" disabled={botBusy} onClick={addBot}>{botBusy ? "…" : "🤖 Ajouter / mettre à jour le joueur IA"}</button>
      {botMsg && <div className={botMsg.startsWith("Joueur") ? "okmsg" : "err"} style={{ textAlign: "center" }}>{botMsg}</div>}

      <CreatePlayerAccount groupName={groupName} code={code} />
    </div>
  );
}

function CreatePlayerAccount({ groupName, code }) {
  const [email, setEmail] = useState("");
  const [pw, setPw] = useState("");
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);
  const [done, setDone] = useState(null);
  const [copied, setCopied] = useState(false);
  const canFb = (typeof firebase !== "undefined") && (typeof FIREBASE_CONFIG !== "undefined");

  const gen = () => { const c = "abcdefghijkmnpqrstuvwxyz23456789"; let s = ""; for (let i = 0; i < 8; i++) s += c[Math.floor(Math.random() * c.length)]; setPw(s); };

  const create = async () => {
    setErr(""); setDone(null);
    if (!email.trim() || pw.length < 6) { setErr("Email valide et mot de passe (6 caractères minimum) requis."); return; }
    if (!canFb) { setErr("Firebase non configuré."); return; }
    setBusy(true);
    try {
      let sec; try { sec = firebase.app("playeradmin"); } catch (e) { sec = firebase.initializeApp(FIREBASE_CONFIG, "playeradmin"); }
      await sec.auth().createUserWithEmailAndPassword(email.trim(), pw);
      await sec.auth().signOut();
      setDone({ email: email.trim(), pw });
      setEmail(""); setPw("");
    } catch (e) { setErr(traduireAuthErr(e)); } finally { setBusy(false); }
  };

  const base = typeof window !== "undefined" ? window.location.href.split("?")[0] : "";
  const shareTxt = done ? `Ton accès aux pronos Coupe du Monde 2026 (groupe « ${groupName} ») :\nSite : ${base}\nEmail : ${done.email}\nMot de passe : ${done.pw}\n\n1) Ouvre le site et clique « Se connecter ».\n2) Entre cet email + mot de passe.\n3) Rejoins le groupe avec le code ${code}.\n(Tu pourras changer ton mot de passe via « Mot de passe oublié ».)` : "";
  const copy = async () => { try { await navigator.clipboard.writeText(shareTxt); } catch (e) { const ta = document.createElement("textarea"); ta.value = shareTxt; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); ta.remove(); } setCopied(true); setTimeout(() => setCopied(false), 2000); };

  return (
    <div>
      <div className="sec-h" style={{ marginTop: 22 }}><h3>Créer un compte joueur</h3></div>
      <div className="pickhint" style={{ margin: "0 2px 10px" }}>Crée des identifiants pour un joueur. Ta session d'organisateur n'est pas interrompue. Transmets-lui l'email + mot de passe : il se connecte puis rejoint le groupe avec le code <b>{code}</b>.</div>
      <label className="fl">Email du joueur</label>
      <input className="txt" type="email" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="joueur@email.com" />
      <div style={{ height: 10 }} />
      <label className="fl">Mot de passe</label>
      <div style={{ display: "flex", gap: 8 }}>
        <input className="txt" value={pw} onChange={(e) => setPw(e.target.value)} placeholder="6 caractères minimum" />
        <button className="btn ghost sm" style={{ width: "auto", whiteSpace: "nowrap" }} onClick={gen}>Générer</button>
      </div>
      {err && <div className="err">{err}</div>}
      <div style={{ height: 12 }} />
      <button className="btn pri" disabled={busy} onClick={create}>{busy ? "…" : "Créer le compte"}</button>

      {done && (
        <div className="note" style={{ marginTop: 14 }}>
          <b>Compte créé ✓</b><br />
          Email : <b>{done.email}</b><br />
          Mot de passe : <b>{done.pw}</b><br />
          <div style={{ height: 10 }} />
          <button className="btn ghost sm" style={{ width: "auto" }} onClick={copy}>{copied ? "✓ Identifiants copiés" : "Copier les identifiants à envoyer"}</button>
        </div>
      )}
    </div>
  );
}

function AdminParJour({ results, setResMatch, setKoField }) {
  const now = useNow();
  const [q, setQ] = useState("");
  const [todo, setTodo] = useState(false);

  const items = [];
  ALL_MATCHES.forEach((m) => { const r = results.matches?.[m.id] || { a: "", b: "" }; items.push({ kind: "g", id: m.id, m, a: m.a, b: m.b, date: m.date, time: m.time, k: kickoffMs(m), va: r.a || "", vb: r.b || "", has: r.a !== "" && r.a != null && r.b !== "" && r.b != null }); });
  KNOCKOUT.forEach((m) => { const t = results.ko?.[m.id]; if (!t || !t.a || !t.b) return; items.push({ kind: "k", id: m.id, m, a: t.a, b: t.b, date: m.date, time: m.time, k: kickoffMs(m), va: t.sa || "", vb: t.sb || "", has: t.sa !== "" && t.sa != null && t.sb !== "" && t.sb != null }); });
  items.sort((x, y) => x.k - y.k);

  const matchesQ = (it) => { const n = norm(q.trim()); if (!n) return true; return norm(it.a).includes(n) || norm(it.b).includes(n); };
  const base = items.filter(matchesQ);
  const todoCount = base.filter((it) => !it.has).length;
  const shown = todo ? base.filter((it) => !it.has) : base;

  const days = []; const byKey = {};
  shown.forEach((it) => { if (!byKey[it.date]) { byKey[it.date] = { date: it.date, list: [] }; days.push(byKey[it.date]); } byKey[it.date].list.push(it); });

  return (
    <div>
      <div className="sec-h"><h3>Résultats par jour</h3><span className="n">{todoCount} à saisir</span></div>
      <div className="row" style={{ marginBottom: 10 }}>
        <button className={"btn sm " + (todo ? "dark" : "ghost")} style={{ flex: 1 }} onClick={() => setTodo(true)}>À saisir</button>
        <button className={"btn sm " + (!todo ? "dark" : "ghost")} style={{ flex: 1 }} onClick={() => setTodo(false)}>Tous</button>
      </div>
      <div style={{ position: "relative", marginBottom: 10 }}>
        <input className="txt" value={q} onChange={(e) => setQ(e.target.value)} list="wc-pays-res" placeholder="🔎 Rechercher un pays…" />
        {q && <button className="btn ghost sm" style={{ position: "absolute", right: 6, top: 6, width: "auto", padding: "4px 9px" }} onClick={() => setQ("")}>×</button>}
      </div>
      <datalist id="wc-pays-res">{TEAMS.map((t) => <option key={t.name} value={t.name} />)}</datalist>
      {days.length === 0 ? <div className="empty">{q.trim() ? `Aucun match pour « ${q.trim()} ».` : "Aucun match à afficher."}</div>
        : days.map((d) => (
          <div className="gblock" key={d.date} style={{ padding: "4px 13px 10px" }}>
            <div className="ko-h">{fmtDate(d.date)} <span style={{ color: "var(--mut)", fontFamily: "Inter", fontWeight: 600, fontSize: 12 }}>· {d.list.filter((it) => it.has).length}/{d.list.length} saisis</span></div>
            {d.list.map((it) => (
              <React.Fragment key={it.kind + it.id}>
                <div className="match-meta"><span className="t">{it.time}</span>{it.kind === "k" ? " · tableau final" : ""}<MatchBadge status={displayStatus(it.m, now, results.locked)} /></div>
                <div className="match">
                  <span className="tm r"><span className="nm">{it.a}</span><span className="fg">{FLAG[it.a]}</span></span>
                  <span className="score">
                    <input inputMode="numeric" value={it.va} onChange={(e) => it.kind === "g" ? setResMatch(it.id, "a", e.target.value) : setKoField(it.id, "sa", e.target.value)} />
                    <span className="dash">–</span>
                    <input inputMode="numeric" value={it.vb} onChange={(e) => it.kind === "g" ? setResMatch(it.id, "b", e.target.value) : setKoField(it.id, "sb", e.target.value)} />
                  </span>
                  <span className="tm"><span className="fg">{FLAG[it.b]}</span><span className="nm">{it.b}</span></span>
                </div>
              </React.Fragment>
            ))}
          </div>
        ))}
    </div>
  );
}

function Resultats({ code, isAdmin, meta, setMeta, results, setResults, meId, me, onDelete }) {
  const [sub, setSub] = useState("scores");
  const [delConfirm, setDelConfirm] = useState(false);
  const now = useNow();

  if (!isAdmin) {
    // vue lecture seule pour les membres
    return (
      <div>
        <div className="sec-h"><h3>Suivi du tournoi</h3></div>
        <div className="note">Seul l'organisateur du groupe (<b>{meta.name}</b>) saisit les résultats officiels. Dès qu'un score est entré, le classement se met à jour pour tout le monde. Voici les règles de points en vigueur :</div>
        <div className="card">
          {Object.keys(RULE_LABELS).map((k) => (
            <div className="rule" key={k}><span className="rl">{RULE_LABELS[k]}</span>
              <span className="disp" style={{ fontSize: 20, color: "var(--mag)" }}>+{meta.rules[k]}</span></div>
          ))}
        </div>
      </div>
    );
  }

  // Résultats réels = GLOBAL (visibles par tous les groupes) ; le verrou reste propre au groupe.
  const saveGlobal = async (next) => { await store.set(KEY.gres, { matches: next.matches, ko: next.ko, run: next.run }); };
  const setResMatch = async (mid, side, val) => {
    val = val.replace(/[^0-9]/g, "").slice(0, 2);
    const next = { ...results, matches: { ...results.matches, [mid]: { ...(results.matches[mid] || { a: "", b: "" }), [side]: val } } };
    setResults(next); await saveGlobal(next);
  };
  const toggleRes = async (round, team, max) => {
    const cur = results.run[round] || [];
    let nx;
    if (cur.includes(team)) nx = cur.filter((t) => t !== team);
    else { if (cur.length >= max) return; nx = [...cur, team]; }
    const next = { ...results, run: { ...results.run, [round]: nx } };
    setResults(next); await saveGlobal(next);
  };
  const setResChamp = async (team) => {
    const next = { ...results, run: { ...results.run, champion: team } };
    setResults(next); await saveGlobal(next);
  };
  const setRule = async (k, v) => {
    const next = { ...meta, rules: { ...meta.rules, [k]: Math.max(0, +String(v).replace(/[^0-9]/g, "") || 0) } };
    setMeta(next); await store.set(KEY.meta(code), next);
  };
  const toggleLock = async () => {
    const next = { ...results, locked: !results.locked };
    setResults(next); await store.set(KEY.results(code), { locked: next.locked });
  };
  const setKoField = async (id, field, val) => {
    if (field === "sa" || field === "sb") val = val.replace(/[^0-9]/g, "").slice(0, 2);
    const next = { ...results, ko: { ...(results.ko || {}), [id]: { ...((results.ko || {})[id] || { a: "", b: "", sa: "", sb: "" }), [field]: val } } };
    setResults(next); await saveGlobal(next);
  };

  const [autoBusy, setAutoBusy] = useState(false);
  const [autoMsg, setAutoMsg] = useState("");
  const autoUpdate = async () => {
    setAutoBusy(true); setAutoMsg("");
    try {
      const res = await fetch("https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json", { cache: "no-store" });
      if (!res.ok) throw new Error("HTTP " + res.status);
      const data = await res.json();
      const ofm = (data.matches || []).filter((o) => o.score && o.score.ft && o.score.ft.length === 2);
      const findEv = (a, b) => ofm.find((o) => (teamEq(a, o.team1) && teamEq(b, o.team2)) || (teamEq(a, o.team2) && teamEq(b, o.team1)));
      const mergeInto = (r) => {
        let nbG = 0, nbK = 0;
        const matches = { ...(r.matches || {}) }, ko = { ...(r.ko || {}) };
        ALL_MATCHES.forEach((m) => {
          const ev = findEv(m.a, m.b); if (!ev) return;
          const [f0, f1] = ev.score.ft;
          matches[m.id] = { a: String(teamEq(m.a, ev.team1) ? f0 : f1), b: String(teamEq(m.a, ev.team1) ? f1 : f0) }; nbG++;
        });
        // Affiches du tableau final : équipes déduites du vainqueur des tours précédents (koTeams)
        KNOCKOUT.forEach((m) => {
          const [ta, tb] = koTeams(m.id, ko); if (!ta || !tb) return;
          const ev = findEv(ta, tb); if (!ev) return;
          const [f0, f1] = ev.score.ft;
          ko[m.id] = { ...(ko[m.id] || {}), sa: String(teamEq(ta, ev.team1) ? f0 : f1), sb: String(teamEq(ta, ev.team1) ? f1 : f0) }; nbK++;
        });
        return { next: { ...r, matches, ko }, nbG, nbK };
      };

      const { next, nbG, nbK } = mergeInto(results);
      setResults(next);
      await store.set(KEY.gres, { matches: next.matches, ko: next.ko, run: next.run });
      setAutoMsg(`Mise à jour : ${nbG} match(s) de poule + ${nbK} affiche(s) appliqués au tableau GLOBAL — visible par tous les groupes ✓`);
    } catch (e) { setAutoMsg("Échec de la récupération : " + (e.message || e)); }
    finally { setAutoBusy(false); }
  };

  return (
    <div>
      <div className="sec-h"><h3>Espace organisateur</h3><span className="adminbadge">Admin</span></div>
      <button className="btn pri" disabled={autoBusy} onClick={autoUpdate}>{autoBusy ? "Récupération…" : "⤓ Mettre à jour les résultats automatiquement"}</button>
      {autoMsg && <div className={autoMsg.startsWith("Mise à jour") ? "okmsg" : "err"} style={{ textAlign: "center" }}>{autoMsg}</div>}
      <div className="pickhint" style={{ margin: "8px 2px 14px" }}>Source : openfootball (gratuit, sans clé). Les scores des poules et du tableau final sont <b>communs à tous les groupes</b> (résultats réels du tournoi) : ta saisie est visible partout. Source mise à jour ~1×/jour — tu peux toujours corriger à la main.</div>
      <div className="row" style={{ marginBottom: 12 }}>
        {[["scores", "Groupes"], ["bracket", "Parcours"], ["finale", "Finale"], ["suivi", "Suivi"], ["regles", "Règles"]].map(([id, lab]) => (
          <button key={id} className={"btn sm " + (sub === id ? "dark" : "ghost")} style={{ flex: 1, padding: "8px 4px" }} onClick={() => setSub(id)}>{lab}</button>
        ))}
      </div>

      {sub === "suivi" && (
        <AdminSuivi code={code} meId={meId} results={results} groupName={meta.name} />
      )}

      {sub === "regles" && (
        <>
          <div className="card">
            <h2>Tes règles de points</h2>
            <p className="lead">Tu fixes la valeur de chaque bonne réponse. Tout est recalculé immédiatement.</p>
            {Object.keys(RULE_LABELS).map((k) => (
              <div className="rule" key={k}>
                <span className="rl">{RULE_LABELS[k]}</span>
                <input inputMode="numeric" value={meta.rules[k]} onChange={(e) => setRule(k, e.target.value)} />
              </div>
            ))}
          </div>
          <div className="card">
            <h2>Verrouillage</h2>
            <p className="lead">Au coup d'envoi, bloque les pronostics pour que personne ne modifie après le début.</p>
            <button className={"btn " + (results.locked ? "pri" : "ghost")} onClick={toggleLock}>
              {results.locked ? "🔒 Pronostics verrouillés — déverrouiller" : "Verrouiller les pronostics"}
            </button>
          </div>
          <div className="card">
            <h2 style={{ color: "var(--mag2)" }}>Supprimer le groupe</h2>
            <p className="lead">Action définitive : efface ce groupe, les pronostics de tous les joueurs et le classement. Irréversible.</p>
            {delConfirm ? (
              <div className="row">
                <button className="btn pri" style={{ background: "var(--mag2)" }} onClick={async () => { setDelConfirm(false); await onDelete(); }}>Oui, supprimer définitivement</button>
                <button className="btn ghost" onClick={() => setDelConfirm(false)}>Annuler</button>
              </div>
            ) : (
              <button className="btn ghost" style={{ color: "var(--mag2)", borderColor: "#ffd0e0" }} onClick={() => setDelConfirm(true)}>Supprimer ce groupe</button>
            )}
          </div>
        </>
      )}

      {sub === "scores" && (
        <>
          <div className="warn">Saisis les scores réels au fil des matchs. Laisse vide les matchs non encore joués.</div>
          {LETTERS.map((L, gi) => {
            const ms = groupMatches(L);
            return (
              <details className="gblock" key={L}>
                <summary>
                  <span className="gletter" style={{ background: GCOL[gi] }}>{L}</span>
                  <span className="gsum-t"><span className="gt">Groupe {L}</span>
                    <span className="gm">{GROUPS[L].map((t) => t[1]).join(" ")}</span></span>
                  <span className="chev">▸</span>
                </summary>
                <div className="gbody">
                  {ms.map((m) => {
                    const r = results.matches[m.id] || { a: "", b: "" };
                    return (
                      <React.Fragment key={m.id}>
                        <div className="match-meta"><span className="t">{fmtDate(m.date)}</span> · {m.time}<MatchBadge status={displayStatus(m, now, results.locked)} /></div>
                        <div className="match">
                          <span className="tm r"><span className="nm">{m.a}</span><span className="fg">{FLAG[m.a]}</span></span>
                          <span className="score">
                            <input className="res" inputMode="numeric" value={r.a} onChange={(e) => setResMatch(m.id, "a", e.target.value)} />
                            <span className="dash">–</span>
                            <input className="res" inputMode="numeric" value={r.b} onChange={(e) => setResMatch(m.id, "b", e.target.value)} />
                          </span>
                          <span className="tm"><span className="fg">{FLAG[m.b]}</span><span className="nm">{m.b}</span></span>
                        </div>
                      </React.Fragment>
                    );
                  })}
                </div>
              </details>
            );
          })}
        </>
      )}

      {sub === "bracket" && (
        <>
          <div className="warn">Coche les équipes qui atteignent réellement chaque tour, puis le champion. Le classement intègre tout automatiquement.</div>
          <div className="card">
            {[["quart", 8, "Quarts de finalistes (8)"], ["demi", 4, "Demi-finalistes (4)"], ["finaliste", 2, "Finalistes (2)"]].map(([round, max, title]) => {
              const sel = results.run[round] || [];
              const full = sel.length >= max;
              return (
                <div key={round} style={{ marginBottom: 16 }}>
                  <div className="pickhint" style={{ fontWeight: 700, color: "var(--ink)", fontSize: 13 }}>{title} — <b>{sel.length}/{max}</b></div>
                  <div className="pickgrid">
                    {TEAMS.map((t) => {
                      const on = sel.includes(t.name);
                      return (
                        <div key={t.name} className={"chip" + (on ? " on" : "") + (!on && full ? " full" : "")}
                          onClick={() => toggleRes(round, t.name, max)}>
                          <span className="fg">{t.flag}</span><span className="nm">{t.name}</span>
                        </div>);
                    })}
                  </div>
                </div>
              );
            })}
            <div className="pickhint" style={{ fontWeight: 700, color: "var(--ink)", fontSize: 13 }}>🏆 Champion du monde</div>
            <select className="sel" value={results.run.champion || ""} onChange={(e) => setResChamp(e.target.value)}>
              <option value="">— Pas encore —</option>
              {TEAMS.map((t) => <option key={t.name} value={t.name}>{t.flag} {t.name}</option>)}
            </select>
          </div>
        </>
      )}

      {sub === "finale" && (
        <>
          <div className="warn">Saisie unique, commune à tous les groupes. Renseigne les 16 affiches des 16es (équipes + score). Les tours suivants se remplissent <b>automatiquement</b> avec le vainqueur de chaque affiche — il ne reste qu'à saisir le score.</div>
          {KO_ROUNDS.map(([rid, rlabel]) => {
            const ms = KNOCKOUT.filter((m) => m.round === rid);
            return (
              <div className="gblock" key={rid} style={{ padding: "4px 13px 10px" }}>
                <div className="ko-h">{rlabel}</div>
                {ms.map((m) => {
                  const allKo = results.ko || {};
                  const k = allKo[m.id] || { a: "", b: "", sa: "", sb: "" };
                  const feeders = KO_FEEDERS[m.id] || [];
                  const auto = feeders.length > 0; // équipes déduites des tours précédents
                  const [slotA, slotB] = KO_SLOTS[m.id] || ["", ""];
                  const da = m.id === "K103" ? (k.a || (feeders[0] ? koLoser(feeders[0], allKo) : "")) : koTeams(m.id, allKo)[0];
                  const db = m.id === "K103" ? (k.b || (feeders[1] ? koLoser(feeders[1], allKo) : "")) : koTeams(m.id, allKo)[1];
                  const fix = (team, slot) => team
                    ? <span className="ko-fix"><span className="fg">{FLAG[team]}</span><span className="nm">{team}</span></span>
                    : <span className="ko-fix tbd">{slot}</span>;
                  return (
                    <div key={m.id}>
                      <div className="match-meta" style={{ textAlign: "left" }}><span className="t">{m.label}</span> · {fmtDate(m.date)} · {m.time}</div>
                      <div className="korow">
                        {auto ? fix(da, slotA) : (
                          <select className="koselect" value={k.a || ""} onChange={(e) => setKoField(m.id, "a", e.target.value)}>
                            <option value="">— Équipe 1 —</option>
                            {TEAMS.map((t) => <option key={t.name} value={t.name}>{t.flag} {t.name}</option>)}
                          </select>
                        )}
                        <span className="score">
                          <input className="res" inputMode="numeric" value={k.sa} onChange={(e) => setKoField(m.id, "sa", e.target.value)} />
                          <span className="dash">–</span>
                          <input className="res" inputMode="numeric" value={k.sb} onChange={(e) => setKoField(m.id, "sb", e.target.value)} />
                        </span>
                        {auto ? fix(db, slotB) : (
                          <select className="koselect" value={k.b || ""} onChange={(e) => setKoField(m.id, "b", e.target.value)}>
                            <option value="">— Équipe 2 —</option>
                            {TEAMS.map((t) => <option key={t.name} value={t.name}>{t.flag} {t.name}</option>)}
                          </select>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            );
          })}
        </>
      )}
    </div>
  );
}

/* --------------------------- PARTAGE ---------------------------- */
function Partage({ code, meta, onPdf }) {
  const [copied, setCopied] = useState("");
  const url = typeof window !== "undefined" ? window.location.href : "";

  const copy = async (text, what) => {
    try { await navigator.clipboard.writeText(text); }
    catch (e) { const ta = document.createElement("textarea"); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); ta.remove(); }
    setCopied(what); setTimeout(() => setCopied(""), 2000);
  };
  const invite = `Rejoins notre groupe de pronos pour la Coupe du Monde 2026 !\nGroupe : ${meta.name}\nCode : ${code}\nOuvre le lien et entre le code pour jouer.\n${url}`;

  return (
    <div>
      <div className="sec-h"><h3>Inviter des amis</h3></div>
      <div className="codebox">
        <div className="lab">Code du groupe</div>
        <div className="big">{code}</div>
        <button className="copy" onClick={() => copy(code, "code")}>{copied === "code" ? "✓ Copié" : "Copier le code"}</button>
      </div>
      <button className="btn pri" onClick={() => copy(invite, "invit")}>{copied === "invit" ? "✓ Invitation copiée" : "Copier le message d'invitation"}</button>
      <div style={{ height: 10 }} />
      {url && <button className="btn ghost" onClick={() => copy(url, "lien")}>{copied === "lien" ? "✓ Lien copié" : "Copier le lien du site"}</button>}

      <div className="sec-h" style={{ marginTop: 22 }}><h3>Mes pronostics</h3></div>
      <button className="btn pri" onClick={onPdf}>📄 Exporter mes pronos en PDF</button>
      <div className="pickhint" style={{ margin: "8px 2px 0" }}>Mise en forme par groupe, par jour et tableau final. Ouvre l'aperçu d'impression → « Enregistrer au format PDF ».</div>

      <div style={{ height: 16 }} />
      <div className="note">
        <b>Comment ça marche</b><br />
        1. Envoie le <b>lien de ce site</b> + le <b>code {code}</b> à tes amis.<br />
        2. Chacun ouvre le lien, clique sur « Rejoindre avec un code » et entre <b>{code}</b>.<br />
        3. Tout le monde remplit ses pronos. Le <b>classement</b> est commun et se met à jour en direct.<br /><br />
        Toi seul, en tant qu'organisateur, saisis les vrais résultats dans l'onglet <b>Résultats</b> — c'est ce qui distribue les points.
      </div>
    </div>
  );
}


class ErrorBoundary extends React.Component {
  constructor(p) { super(p); this.state = { err: null }; }
  static getDerivedStateFromError(err) { return { err }; }
  componentDidCatch(err, info) { console.error("App error:", err, info); }
  render() {
    if (this.state.err) {
      return React.createElement("div", { style: { padding: "24px", fontFamily: "system-ui, sans-serif", color: "#0d1330" } },
        React.createElement("h2", null, "Une erreur est survenue"),
        React.createElement("pre", { style: { whiteSpace: "pre-wrap", background: "#fff0f5", color: "#b30a44", padding: "12px", borderRadius: "8px" } },
          String((this.state.err && this.state.err.stack) || this.state.err)),
        React.createElement("p", null, "Recharge avec Ctrl+Maj+R, puis envoie-moi ce message si ça persiste."));
    }
    return this.props.children;
  }
}

const _root = document.getElementById("root");
const _tree = React.createElement(ErrorBoundary, null, React.createElement(App));
if (ReactDOM.createRoot) { ReactDOM.createRoot(_root).render(_tree); }
else { ReactDOM.render(_tree, _root); }
</script>
