const local = {
  get(k) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch (e) { return null; } },
  set(k, v) { try { v == null ? localStorage.removeItem(k) : localStorage.setItem(k, JSON.stringify(v)); } catch (e) {} },
  list(prefix) { const o = []; for (let i = 0; i < localStorage.length; i++) { const key = localStorage.key(i); if (key && key.startsWith(prefix)) o.push(key); } return o; },
};
const store = {
  async get(path) {
    if (db) { try { const s = await db.ref(path).get(); return s.exists() ? s.val() : null; } catch (e) { return null; } }
    return local.get("db/" + path);
  },
  async set(path, val) {
    if (db) { try { await db.ref(path).set(val); return true; } catch (e) { return false; } }
    local.set("db/" + path, val); return true;
  },
  async delete(path) {
    if (db) { try { await db.ref(path).remove(); return true; } catch (e) { return false; } }
    local.list("db/" + path).forEach((k) => local.set(k, null)); return true;
  },
  async listChildren(path) {
    if (db) { try { const s = await db.ref(path).get(); return s.exists() ? Object.keys(s.val()) : []; } catch (e) { return []; } }
    const pre = "db/" + path + "/";

});

const hasResData = (r) => !!(r && ((r.matches && Object.keys(r.matches).length) || (r.ko && Object.keys(r.ko).length)

  return { matches: src.matches, ko: src.ko, run: src.run, locked: grp.locked };
};

  return Date.UTC(y, mo - 1, d, hh - 2, mm);
}
const LOCK_MS = 15 * 60 * 1000;     // fermeture 15 min avant le coup d'envoi
const MATCH_MS = 2 * 3600 * 1000;   // durée approximative d'un match
const FIRST_KICKOFF = Math.min(...ALL_MATCHES.map(kickoffMs));

// statut d'un match : up (modifiable) | closed (verrouillé <15min) | live | past
function displayStatus(m, now, globalLocked) {
  const k = kickoffMs(m);
  if (now >= k + MATCH_MS) return "past";
  if (now >= k) return "live";
  if (globalLocked || now >= k - LOCK_MS) return "closed";
  return "up";
}

/* ------------------------------------------------------------------ */
/*  SCORE                                                             */
/* ------------------------------------------------------------------ */
function scorePlayer(pred, res, rules) {
  if (!res) return { total: 0, matches: 0, run: 0, exact: 0, results: 0 };
  let mPts = 0, exact = 0, results = 0;
  ALL_MATCHES.forEach((m) => {
    const r = res.matches?.[m.id];
    const p = pred.matches?.[m.id];
    if (!r || r.a === "" || r.b === "" || !p || p.a === "" || p.b === "") return;
    const ra = +r.a, rb = +r.b, pa = +p.a, pb = +p.b;
    if (pa === ra && pb === rb) { mPts += rules.exact; exact++; }
    else if (sign(pa - pb) === sign(ra - rb)) { mPts += rules.result; results++; }
  });
  // matchs à élimination directe (score exact / bon résultat, mêmes barèmes)
  const ko = res.ko || {};
  Object.keys(ko).forEach((id) => {
    const r = ko[id], p = pred.ko?.[id];
    if (!r || r.sa == null || r.sa === "" || r.sb == null || r.sb === "") return;
    if (!p || p.sa === "" || p.sb === "" || p.sa == null || p.sb == null) return;
    const ra = +r.sa, rb = +r.sb, pa = +p.sa, pb = +p.sb;
    if (pa === ra && pb === rb) { mPts += rules.exact; exact++; }
    else if (sign(pa - pb) === sign(ra - rb)) { mPts += rules.result; results++; }
  });
  let rPts = 0;
  const cnt = (predArr, realArr, pts) =>
    (predArr || []).reduce((s, t) => s + ((realArr || []).includes(t) ? pts : 0), 0);
  rPts += cnt(pred.run?.quart, res.run?.quart, rules.quart);
  rPts += cnt(pred.run?.demi, res.run?.demi, rules.demi);
  rPts += cnt(pred.run?.finaliste, res.run?.finaliste, rules.finaliste);
  if (pred.run?.champion && pred.run.champion === res.run?.champion) rPts += rules.champion;
  return { total: mPts + rPts, matches: mPts, run: rPts, exact, results };
}

function buildPdfHtml(pred, results, meta, name) {
  const esc = (s) => String(s == null ? "" : s).replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
  const sc = (a, b) => (a !== "" && a != null && b !== "" && b != null) ? `${a} – ${b}` : "—";
  const ko = results?.ko || {};

  let grp = "";
  LETTERS.forEach((L) => {
    const rows = groupMatches(L).map((m) => {
      const p = pred.matches?.[m.id] || { a: "", b: "" };
      return `<tr><td class="right">${esc(m.a)}</td><td class="sc">${esc(sc(p.a, p.b))}</td><td>${esc(m.b)}</td></tr>`;
    }).join("");
    grp += `<h3>Groupe ${L}</h3><table>${rows}</table>`;
  });

  const items = [];
  ALL_MATCHES.forEach((m) => { const p = pred.matches?.[m.id] || { a: "", b: "" }; items.push({ k: kickoffMs(m), date: m.date, time: m.time, a: m.a, b: m.b, s: sc(p.a, p.b) }); });
  KNOCKOUT.forEach((m) => { const [ta, tb] = koTeams(m.id, ko); if (!ta || !tb) return; const p = pred.ko?.[m.id] || { sa: "", sb: "" }; items.push({ k: kickoffMs(m), date: m.date, time: m.time, a: ta, b: tb, s: sc(p.sa, p.sb), ko: true }); });
  items.sort((x, y) => x.k - y.k);
  let day = ""; let cur = null;
  items.forEach((it) => {
    if (it.date !== cur) { if (cur !== null) day += "</table>"; cur = it.date; day += `<h3>${esc(fmtDate(it.date))}</h3><table>`; }
    day += `<tr><td class="tm">${esc(it.time)}</td><td class="right">${esc(it.a)}</td><td class="sc">${esc(it.s)}</td><td>${esc(it.b)}${it.ko ? ' <span class="kob">finale</span>' : ""}</td></tr>`;
  });
  if (cur !== null) day += "</table>";

  const run = pred.run || {};
  const list = (a) => (a && a.length ? a.map(esc).join(", ") : "—");
  const koRows = KNOCKOUT.map((m) => {
    const [ta, tb] = koTeams(m.id, ko); if (!ta || !tb) return "";
    const p = pred.ko?.[m.id] || { sa: "", sb: "" };
    return `<tr><td class="right">${esc(ta)}</td><td class="sc">${esc(sc(p.sa, p.sb))}</td><td>${esc(tb)}</td></tr>`;
  }).join("");
  let fin = `<div class="parc"><b>Champion :</b> ${esc(run.champion || "—")}<br><b>Finalistes :</b> ${list(run.finaliste)}<br><b>Demi-finalistes :</b> ${list(run.demi)}<br><b>Quarts de finalistes :</b> ${list(run.quart)}</div>`;
  if (koRows) fin += `<h3>Matchs du tableau final</h3><table>${koRows}</table>`;

  const today = new Date().toLocaleDateString("fr-FR", { day: "numeric", month: "long", year: "numeric" });
  const css = "*{box-sizing:border-box}body{font-family:Arial,Helvetica,sans-serif;color:#16203a;margin:24px;}"
    + "h1{font-size:22px;margin:0 0 2px;}.sub{color:#777;font-size:12px;margin:0 0 6px;}"
    + "h2{font-size:16px;color:#d61458;border-bottom:2px solid #ffd0e0;padding-bottom:4px;margin:24px 0 8px;page-break-after:avoid;}"
    + "h3{font-size:13px;margin:12px 0 3px;page-break-after:avoid;}"
    + "table{width:100%;border-collapse:collapse;margin:2px 0 6px;font-size:12px;}"
    + "td{padding:4px 6px;border-bottom:1px solid #eee;}td.sc{text-align:center;font-weight:bold;width:74px;white-space:nowrap;}"
    + "td.tm{color:#999;width:46px;}td.right{text-align:right;}"
    + ".kob{font-size:9px;color:#9a6b00;background:#fff6e6;padding:1px 5px;border-radius:4px;}"
    + ".parc{font-size:12px;line-height:1.8;}.parc b{color:#d61458;}"
    + ".sec{page-break-before:always;}@media print{body{margin:12mm;}}";
  const autoprint = "<scr" + "ipt>window.onload=function(){setTimeout(function(){window.print();},350);};</scr" + "ipt>";
  return "<!doctype html><html lang=\"fr\"><head><meta charset=\"utf-8\"><title>Pronos CDM2026 - " + esc(name) + "</title><style>" + css + "</style></head><body>"
    + "<h1>Mes pronostics — Coupe du Monde 2026</h1>"
    + "<p class=\"sub\">" + esc(name) + " · groupe « " + esc(meta?.name || "") + " » · édité le " + today + "</p>"
    + "<h2>Phase de groupes (par groupe)</h2>" + grp
    + "<div class=\"sec\"></div><h2>Calendrier (par jour)</h2>" + day
    + "<div class=\"sec\"></div><h2>Tableau final</h2>" + fin
    + autoprint + "</body></html>";
}

function exportPredPdf(pred, results, meta, name) {
  const w = window.open("", "_blank");
  if (!w) { alert("Autorise les pop-ups pour générer le PDF, puis réessaie."); return; }
  w.document.open(); w.document.write(buildPdfHtml(pred, results, meta, name)); w.document.close(); w.focus();
}

function App() {
  const [me, setMe] = useState(null);          // {name, groups:[{code,pid,gname}], active}
  const [meta, setMeta] = useState(null);
  const [results, setResults] = useState(null);
  const [pred, setPred] = useState(emptyPred());
  const [tab, setTab] = useState("pronos");
  const [booting, setBooting] = useState(true);
  const [adding, setAdding] = useState(false);
  const [theme, setThemeRaw] = useState(getTheme());
  const setTheme = (t) => { setThemeRaw(t); saveTheme(t); };
  const [user, setUser] = useState(null);
  const [showAuth, setShowAuth] = useState(false);
  const authOn = (typeof auth !== "undefined") && !!auth;
  const doLogout = async () => { try { if (authOn) await auth.signOut(); } catch (e) {} setUser(null); };

  const pidOf = (m, code) => m?.groups?.find((g) => g.code === code)?.pid;

  // migration depuis l'ancien format {id,name,code}
  const migrate = (saved) => {
    if (!saved) return null;
    if (saved.groups) return saved;
    if (saved.code) return { name: saved.name, groups: [{ code: saved.code, pid: saved.id, gname: "" }], active: saved.code };
    return null;
  };

  useEffect(() => {
    (async () => {
      const saved = migrate(local.get(MEKEY));
      if (saved && saved.groups && saved.groups.length && saved.active) {
        const mem = saved.groups.find((g) => g.code === saved.active) || saved.groups[0];
        const m = await store.get(KEY.meta(mem.code));
        if (m) { setMe({ ...saved, active: mem.code }); await loadGroup(mem.code, mem.pid); }
        else { setMe(saved); }
      }
      setBooting(false);
    })();
  }, []);

  // connexion : restaure le profil cloud (pseudo + groupes + pronos) sur n'importe quel appareil
  useEffect(() => {
    if (!authOn) return;
    const unsub = auth.onAuthStateChanged(async (u) => {
      setUser(u || null);
      if (!u) return;
      setShowAuth(false);
      try {
        const saved = migrate(await store.get(KEY.userMe(u.uid)));
        if (saved && saved.groups && saved.groups.length) {
          local.set(MEKEY, saved);
          const mem = saved.groups.find((g) => g.code === saved.active) || saved.groups[0];
          const m = await store.get(KEY.meta(mem.code));
          if (m) { setMe({ ...saved, active: mem.code }); await loadGroup(mem.code, mem.pid); setAdding(false); }
          else setMe(saved);
        }
      } catch (e) { console.error("auth load", e); }
    });
    return () => { try { unsub && unsub(); } catch (e) {} };
  }, [authOn]);

  // sauvegarde du profil sous le compte dès qu'il change (si connecté)
  useEffect(() => {
    if (authOn && user && me) { try { store.set(KEY.userMe(user.uid), me); } catch (e) {} }
  }, [me, user]);

  // à l'arrivée d'un nouveau (aucun profil local, pas connecté) : proposer la connexion/inscription
  useEffect(() => {
    if (!booting && authOn && !me && !user) setShowAuth(true);
  }, [booting]);

  async function loadGroup(code, pid) {
    const [m, r, p, gr] = await Promise.all([
      store.get(KEY.meta(code)),
      store.get(KEY.results(code)),
      store.get(KEY.player(code, pid)),
      store.get(KEY.gres),
    ]);
    setMeta(m);
    setResults(mergeResults(gr, r));
    setPred(normPred(p?.pred));
  }

  async function createGroup(name, gname) {
    try {
      const code = randCode();
      const id = randId();
      const m = { name: gname || "Mon groupe", admin: id, rules: { ...DEFAULT_RULES }, created: Date.now() };
      const r = emptyResults();
      await store.set(KEY.meta(code), m);
      await store.set(KEY.results(code), r);
      await store.set(KEY.player(code, id), { name, pred: emptyPred(), joined: Date.now() });
      setMe((prev) => {
        const base = prev || { name, groups: [], active: null };
        const groups = [...base.groups.filter((g) => g.code !== code), { code, pid: id, gname: m.name }];
        const next = { name: name || base.name, groups, active: code };
        local.set(MEKEY, next);
        return next;
      });
      setMeta(m); setResults(r); setPred(emptyPred()); setTab("pronos"); setAdding(false);
    } catch (e) { console.error("createGroup", e); }
  }

  async function joinGroup(name, code) {
    code = code.trim().toUpperCase();
    const m = await store.get(KEY.meta(code));
    if (!m) return false;
    let pid = pidOf(me, code);
    let existing = null;
    if (pid) existing = await store.get(KEY.player(code, pid));
    if (!pid) { pid = randId(); await store.set(KEY.player(code, pid), { name, pred: emptyPred(), joined: Date.now() }); }
    const [r, gr] = await Promise.all([store.get(KEY.results(code)), store.get(KEY.gres)]);
    setMe((prev) => {
      const base = prev || { name, groups: [], active: null };
      const groups = base.groups.some((g) => g.code === code) ? base.groups : [...base.groups, { code, pid, gname: m.name }];
      const next = { name: name || base.name, groups, active: code };
      local.set(MEKEY, next);
      return next;
    });
    setMeta(m);
    setResults(mergeResults(gr, r));
    setPred(normPred(existing?.pred));
    setTab("pronos"); setAdding(false);
    return true;
  }

  async function switchGroup(code) {
    if (!me || code === me.active) return;
    const pid = pidOf(me, code);
    const next = { ...me, active: code };
    setMe(next); local.set(MEKEY, next);
    await loadGroup(code, pid);
    setTab("pronos");
  }

  async function leaveGroup() {
    const code = me.active;
    const groups = me.groups.filter((g) => g.code !== code);
    if (groups.length) {
      const next = { ...me, groups, active: groups[0].code };
      setMe(next); local.set(MEKEY, next);
      await loadGroup(groups[0].code, groups[0].pid);
      setTab("pronos");
    } else {
      local.set(MEKEY, null);
      setMe(null); setMeta(null); setResults(null); setPred(emptyPred());
    }
  }

  async function deleteGroup() {
    const code = me.active;
    await store.delete(KEY.group(code));
    const groups = me.groups.filter((g) => g.code !== code);
    if (groups.length) {
      const next = { ...me, groups, active: groups[0].code };
      setMe(next); local.set(MEKEY, next);
      await loadGroup(groups[0].code, groups[0].pid);
      setTab("pronos");
    } else {
      local.set(MEKEY, null);
      setMe(null); setMeta(null); setResults(null); setPred(emptyPred());
    }
  }

  if (booting) return <Boot />;
  if (!me || adding || !meta)
    return <><style>{CSS}</style>
      {showAuth && authOn && <Auth auth={auth} onClose={() => setShowAuth(false)} />}
      <Welcome onCreate={createGroup} onJoin={joinGroup} theme={theme} setTheme={setTheme}
        authOn={authOn} onAuth={() => setShowAuth(true)}
        existingName={me?.name} canCancel={!!(me && meta)} onCancel={() => setAdding(false)} />
    </>;

  const activeCode = me.active;
  const activePid = pidOf(me, activeCode);
  const isAdmin = meta.admin === activePid || isSuperAdmin(user);

  async function savePred() {
    try {
      const existing = await store.get(KEY.player(activeCode, activePid));
      const ok = await store.set(KEY.player(activeCode, activePid), { ...(existing || {}), name: (existing && existing.name) || me.name, pred });
      return ok !== false;
    } catch (e) { console.error("savePred", e); return false; }
  }

  return (
    <div className={"wc has-side theme-" + theme}>
      <style>{CSS}</style>
      {showAuth && authOn && <Auth auth={auth} onClose={() => setShowAuth(false)} />}
      <Hero meta={meta} />
      <div className="wrap">
        <TopBar me={me} meta={meta} theme={theme} setTheme={setTheme} user={user} authOn={authOn} onAuth={() => setShowAuth(true)} onLogout={doLogout} onSwitch={switchGroup} onAdd={() => setAdding(true)} onLeave={leaveGroup} />
        {!online && <div className="warn">{OFFLINE_MSG}</div>}
        {tab === "pronos" && (
          <GroupPronos pred={pred} setPred={setPred} results={results} onSave={savePred} onPdf={() => exportPredPdf(pred, results, meta, me.name)} />
        )}
        {tab === "jour" && (
          <ParJour pred={pred} setPred={setPred} results={results} onSave={savePred} onPdf={() => exportPredPdf(pred, results, meta, me.name)} />
        )}
        {tab === "tableau" && <BracketFinal results={results} pred={pred} />}
        {tab === "parcours" && (
          <Parcours pred={pred} setPred={setPred} results={results} onSave={savePred} />
        )}
        {tab === "finale" && (
          <Finale pred={pred} setPred={setPred} results={results} onSave={savePred} />
        )}
        {tab === "live" && (
          <Live code={activeCode} meId={activePid} results={results} />
        )}
        {tab === "tournoi" && <Tournoi results={results} />}
        {tab === "classement" && (
          <Classement code={activeCode} meId={activePid} rules={meta.rules} results={results} />
        )}
        {tab === "resultats" && (
          <Resultats code={activeCode} isAdmin={isAdmin} meta={meta} setMeta={setMeta}
            results={results} setResults={setResults} meId={activePid} me={me} onDelete={deleteGroup} />
        )}
        {tab === "partage" && <Partage code={activeCode} meta={meta} onPdf={() => exportPredPdf(pred, results, meta, me.name)} />}
        {tab === "cotes" && isAdmin && <Cotes results={results} />}
      </div>
      <Tabs tab={tab} setTab={setTab} isAdmin={isAdmin} />
    </div>
  );
}

/* --------------------------- WELCOME ---------------------------- */
function traduireAuthErr(e) {
  const c = (e && e.code) || "";
  const tag = c ? ` (${c})` : "";
  if (c.includes("invalid-email")) return "Adresse email invalide." + tag;
  if (c.includes("missing-password") || c.includes("weak-password")) return "Mot de passe trop court (6 caractères minimum)." + tag;
  if (c.includes("email-already-in-use")) return "Un compte existe déjà avec cet email — connecte-toi." + tag;
  if (c.includes("user-not-found") || c.includes("invalid-credential") || c.includes("wrong-password")) return "Email ou mot de passe incorrect." + tag;
  if (c.includes("operation-not-allowed")) return "Connexion par email désactivée côté Firebase (à activer dans la console)." + tag;
  if (c.includes("too-many-requests")) return "Trop de tentatives, réessaie dans un moment." + tag;
  if (c.includes("network")) return "Connexion réseau bloquée — souvent les Shields de Brave. Baisse le bouclier pour ce site." + tag;
  return ((e && e.message) || "Erreur de connexion.") + tag;
}

function Auth({ auth, onClose }) {
  const [mode, setMode] = useState("login");
  const [email, setEmail] = useState("");
  const [pw, setPw] = useState("");
  const [err, setErr] = useState("");
  const [info, setInfo] = useState("");
  const [busy, setBusy] = useState(false);

  const submit = async () => {
    setErr(""); setInfo("");
    if (!email.trim() || pw.length < 6) { setErr("Email valide et mot de passe (6 caractères minimum) requis."); return; }
    setBusy(true);
    try {
      if (mode === "login") await auth.signInWithEmailAndPassword(email.trim(), pw);
      else await auth.createUserWithEmailAndPassword(email.trim(), pw);
      onClose();
    } catch (e) { setErr(traduireAuthErr(e)); } finally { setBusy(false); }
  };

  const reset = async () => {
    setErr(""); setInfo("");
    if (!email.trim()) { setErr("Entre d'abord ton email, puis clique sur « Mot de passe oublié »."); return; }
    setBusy(true);
    try { await auth.sendPasswordResetEmail(email.trim()); setInfo("Email de réinitialisation envoyé. Regarde ta boîte (et les spams)."); }
    catch (e) { setErr(traduireAuthErr(e)); } finally { setBusy(false); }
  };

  return (
    <div className="modal-bg" onClick={(e) => { if (e.target.classList.contains("modal-bg")) onClose(); }}>
      <div className="modal">
        <h2>{mode === "login" ? "Se connecter" : "Créer un compte"}</h2>
        <p className="lead">Connecte-toi par email pour retrouver tes pronos sur n'importe quel appareil — même après avoir vidé les cookies.</p>
        <label className="fl">Email</label>
        <input className="txt" type="email" autoComplete="email" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="toi@email.com" />
        <div style={{ height: 10 }} />
        <label className="fl">Mot de passe</label>
        <input className="txt" type="password" autoComplete={mode === "login" ? "current-password" : "new-password"} value={pw} onChange={(e) => setPw(e.target.value)} placeholder="6 caractères minimum" onKeyDown={(e) => { if (e.key === "Enter") submit(); }} />
        {mode === "login" && <button className="linkbtn" onClick={reset} disabled={busy}>Mot de passe oublié ?</button>}
        {err && <div className="err">{err}</div>}
        {info && <div className="okmsg">{info}</div>}
        <div style={{ height: 14 }} />
        <button className="btn pri" disabled={busy} onClick={submit}>{busy ? "…" : (mode === "login" ? "Se connecter" : "Créer le compte")}</button>
        <div style={{ height: 8 }} />
        <button className="btn ghost" onClick={() => { setErr(""); setInfo(""); setMode(mode === "login" ? "signup" : "login"); }}>{mode === "login" ? "Pas de compte ? En créer un" : "Déjà un compte ? Se connecter"}</button>
        <div style={{ height: 8 }} />
        <button className="btn ghost" onClick={onClose}>Continuer sans compte</button>
      </div>
    </div>
  );
}

function useNow(ms = 60000) {
  const [now, setNow] = useState(Date.now());
  useEffect(() => { const id = setInterval(() => setNow(Date.now()), ms); return () => clearInterval(id); }, [ms]);
  return now;
}
function MatchBadge({ status }) {
  if (status === "live") return <span className="badge live"><span className="dot" />En direct</span>;
  if (status === "past") return <span className="badge past">Terminé</span>;
  if (status === "closed") return <span className="badge closed">🔒 Fermé</span>;
  return <span className="badge up">À venir</span>;
}

/* ----- Onglet GROUPES : scores de la phase de groupes ----- */
/* Place actuelle de chaque équipe dans sa poule (selon résultats réels saisis) */
function computeRanks(results) {
  const out = {};
  LETTERS.forEach((L) => {
    const played = groupMatches(L).some((m) => { const r = results?.matches?.[m.id]; return r && r.a !== "" && r.a != null && r.b !== "" && r.b != null; });
    groupStandings(L, results).forEach((s, i) => { out[s.team] = { rank: i + 1, played }; });
  });
  return out;
}
function RankPill({ info }) {
  if (!info || !info.played) return null;
  const suf = info.rank === 1 ? "er" : "e";
  return <span className={"rankpill r" + info.rank} title="Place actuelle dans la poule">({info.rank}{suf})</span>;
}

/* Affiche le score réel sous un match (vert si saisi, comparé au prono) */
function RealScore({ ra, rb, pa, pb }) {
  if (ra === "" || ra == null || rb === "" || rb == null) return null;
  const filledP = pa !== "" && pa != null && pb !== "" && pb != null;
  const exact = filledP && +pa === +ra && +pb === +rb;
  const goodSign = filledP && Math.sign(+pa - +pb) === Math.sign(+ra - +rb);
  const tag = exact ? "🎯 exact" : (goodSign ? "✔ bon résultat" : (filledP ? "✘ raté" : ""));
  return (
    <div className="real-score">
      <span className="rs-lbl">Résultat réel</span>
      <b className="rs-val">{ra} – {rb}</b>
      {tag && <span className={"rs-tag " + (exact ? "ok" : goodSign ? "mid" : "ko")}>{tag}</span>}
    </div>
  );
}

function GroupPronos({ pred, setPred, results, onSave, onPdf }) {
  const now = useNow();
  const locked = results?.locked;

  const setMatch = (mid, side, val) => {
    const m = ALL_MATCHES.find((x) => x.id === mid);
    if (!m || displayStatus(m, now, locked) !== "up") return;
    val = val.replace(/[^0-9]/g, "").slice(0, 2);
    setPred((p) => ({ ...p, matches: { ...p.matches, [mid]: { ...(p.matches[mid] || { a: "", b: "" }), [side]: val } } }));
  };

  const filled = ALL_MATCHES.filter((m) => { const p = pred.matches[m.id]; return p && p.a !== "" && p.b !== ""; }).length;
  const ranks = computeRanks(results);

  return (
    <div>
      {locked && <div className="warn">🔒 Les pronostics sont verrouillés par l'organisateur. Tu peux suivre le classement.</div>}
      <div className="sec-h"><h3>Phase de groupes</h3><span className="n">{filled}/72 matchs</span></div>
      <div className="miniprog"><i style={{ width: `${(filled / 72) * 100}%` }} /></div>
      <div className="pickhint" style={{ margin: "7px 2px 0" }}>🕐 Horaires en heure de Paris. Les pronos d'un match se ferment <b>15 min avant</b> le coup d'envoi.</div>
      {onPdf && <button className="btn ghost sm" style={{ width: "auto", marginTop: 8 }} onClick={onPdf}>📄 Télécharger mes pronos (PDF)</button>}
      <div style={{ height: 12 }} />
      {LETTERS.map((L, gi) => {
        const ms = groupMatches(L);
        const gfilled = ms.filter((m) => { const p = pred.matches[m.id]; return p && p.a !== "" && p.b !== ""; }).length;
        return (
          <details className="gblock" key={L} open={gi === 0}>
            <summary>
              <span className="gletter" style={{ background: GCOL[gi] }}>{L}</span>
              <span className="gsum-t">
                <span className="gt">Groupe {L}</span>
                <span className="gm">{GROUPS[L].map((t) => t[1]).join(" ")} · {gfilled}/6 remplis</span>
              </span>
              <span className="chev">▸</span>
            </summary>
            <div className="gbody">
              {ms.map((m) => {
                const p = pred.matches[m.id] || { a: "", b: "" };
                const st = displayStatus(m, now, locked);
                const editable = st === "up";
                return (
                  <React.Fragment key={m.id}>
                    <div className="match-meta"><span className="t">{fmtDate(m.date)}</span> · {m.time}<MatchBadge status={st} /></div>
                    <div className="match">
                      <span className="tm r"><RankPill info={ranks[m.a]} /><span className="nm">{m.a}</span><span className="fg">{FLAG[m.a]}</span></span>
                      <span className="score">
                        <input inputMode="numeric" value={p.a} onChange={(e) => setMatch(m.id, "a", e.target.value)} disabled={!editable} />
                        <span className="dash">–</span>
                        <input inputMode="numeric" value={p.b} onChange={(e) => setMatch(m.id, "b", e.target.value)} disabled={!editable} />
                      </span>
                      <span className="tm"><span className="fg">{FLAG[m.b]}</span><span className="nm">{m.b}</span><RankPill info={ranks[m.b]} /></span>
                    </div>
                    {(() => { const r = results?.matches?.[m.id] || {}; return <RealScore ra={r.a} rb={r.b} pa={p.a} pb={p.b} />; })()}
                  </React.Fragment>
                );
              })}
            </div>
          </details>
        );
      })}
      <SaveBar onSave={onSave} locked={locked} />
    </div>
  );
}

/* ----- Onglet PAR JOUR : matchs par date, paris à faire (reprend les pronos de groupe) ----- */
function ParJour({ pred, setPred, results, onSave, onPdf }) {
  const now = useNow();
  const locked = results?.locked;
  const [mode, setMode] = useState("todo"); // "todo" | "today" | "all"
  const [q, setQ] = useState("");
  const todayISO = (() => { const d = new Date(now); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`; })();

  const setMatch = (mid, side, val) => {
    const m = ALL_MATCHES.find((x) => x.id === mid);
    if (!m || displayStatus(m, now, locked) !== "up") return;
    val = val.replace(/[^0-9]/g, "").slice(0, 2);
    setPred((p) => ({ ...p, matches: { ...p.matches, [mid]: { ...(p.matches[mid] || { a: "", b: "" }), [side]: val } } }));
  };
  const setKo = (id, side, val) => {
    const km = KO_BY_ID[id]; const [ta, tb] = koTeams(id, results.ko || {});
    if (!ta || !tb || displayStatus(km, now, locked) !== "up") return;
    val = val.replace(/[^0-9]/g, "").slice(0, 2);
    setPred((p) => ({ ...p, ko: { ...p.ko, [id]: { ...(p.ko?.[id] || { sa: "", sb: "" }), [side]: val } } }));
  };

  const ranks = computeRanks(results);
  const items = [];
  ALL_MATCHES.forEach((m) => {
    const p = pred.matches[m.id] || { a: "", b: "" };
    items.push({ kind: "g", id: m.id, m, a: m.a, b: m.b, date: m.date, time: m.time, k: kickoffMs(m), pa: p.a, pb: p.b, has: p.a !== "" && p.b !== "" });
  });
  KNOCKOUT.forEach((m) => {
    const [ta, tb] = koTeams(m.id, results.ko || {}); if (!ta || !tb) return;
    const p = pred.ko?.[m.id] || { sa: "", sb: "" };
    items.push({ kind: "k", id: m.id, m, a: ta, b: tb, date: m.date, time: m.time, k: kickoffMs(m), pa: p.sa, pb: p.sb, has: p.sa !== "" && p.sb !== "" });
  });
  items.sort((x, y) => x.k - y.k);

  const matchesQ = (it) => { const n = norm(q.trim()); if (!n) return true; return norm(it.a).includes(n) || norm(it.b).includes(n); };
  const base = items.filter(matchesQ);
  const isTodo = (it) => displayStatus(it.m, now, locked) === "up" && !it.has;
  const todoCount = base.filter(isTodo).length;
  const todayCount = base.filter((it) => it.date === todayISO).length;
  const shown = mode === "todo" ? base.filter(isTodo) : mode === "today" ? base.filter((it) => it.date === todayISO) : base;

  const days = []; const byKey = {};
  shown.forEach((it) => { if (!byKey[it.date]) { byKey[it.date] = { date: it.date, list: [] }; days.push(byKey[it.date]); } byKey[it.date].list.push(it); });

  return (
    <div>
      <div className="sec-h"><h3>Paris à faire par jour</h3><span className="n">{todoCount} à faire</span></div>
      <div className="row" style={{ marginBottom: 10 }}>
        <button className={"btn sm " + (mode === "todo" ? "dark" : "ghost")} style={{ flex: 1 }} onClick={() => setMode("todo")}>À faire</button>
        <button className={"btn sm " + (mode === "today" ? "dark" : "ghost")} style={{ flex: 1 }} onClick={() => setMode("today")}>Matchs du jour{todayCount ? ` (${todayCount})` : ""}</button>
        <button className={"btn sm " + (mode === "all" ? "dark" : "ghost")} style={{ flex: 1 }} onClick={() => setMode("all")}>Tous les matchs</button>
      </div>
      <div style={{ position: "relative", marginBottom: 10 }}>
        <input className="txt" value={q} onChange={(e) => setQ(e.target.value)} list="wc-pays" placeholder="🔎 Rechercher un pays (ex. France, Brésil…)" />
        {q && <button className="btn ghost sm" style={{ position: "absolute", right: 6, top: 6, width: "auto", padding: "4px 9px" }} onClick={() => setQ("")}>×</button>}
      </div>
      <datalist id="wc-pays">{TEAMS.map((t) => <option key={t.name} value={t.name} />)}</datalist>
      <div className="pickhint" style={{ margin: "0 2px 10px" }}>Mêmes pronos que l'onglet Groupes/Finale, classés par date. Un match se ferme 15 min avant le coup d'envoi.</div>
      {onPdf && <button className="btn ghost sm" style={{ width: "auto", marginBottom: 10 }} onClick={onPdf}>📄 Télécharger mes pronos (PDF)</button>}
      {locked && <div className="warn">🔒 Pronostics verrouillés par l'organisateur.</div>}

      {days.length === 0 ? (
        <div className="empty">{q.trim() ? `Aucun match ${mode === "todo" ? "à faire " : ""}pour « ${q.trim()} ».` : (mode === "todo" ? "Rien à faire pour l'instant — tous tes pronos sont posés 🎉" : mode === "today" ? "Aucun match aujourd'hui." : "Aucun match à afficher.")}</div>
      ) : days.map((d) => {
        const dn = d.list.filter((it) => it.has).length;
        return (
          <div className="gblock" key={d.date} style={{ padding: "4px 13px 10px" }}>
            <div className="ko-h">{fmtDate(d.date)} <span style={{ color: "var(--mut)", fontFamily: "Inter", fontWeight: 600, fontSize: 12 }}>· {dn}/{d.list.length} pronostiqués</span></div>
            {d.list.map((it) => {
              const st = displayStatus(it.m, now, locked);
              const editable = st === "up";
              const set = it.kind === "g" ? setMatch : setKo;
              const sideA = it.kind === "g" ? "a" : "sa";
              const sideB = it.kind === "g" ? "b" : "sb";
              const rr = it.kind === "g" ? (results?.matches?.[it.id] || {}) : (results?.ko?.[it.id] || {});
              const ra = it.kind === "g" ? rr.a : rr.sa;
              const rb = it.kind === "g" ? rr.b : rr.sb;
              return (
                <React.Fragment key={it.kind + it.id}>
                  <div className="match-meta"><span className="t">{it.time}</span>{it.kind === "k" ? " · tableau final" : ""}<MatchBadge status={st} /></div>
                  <div className="match">
                    <span className="tm r">{it.kind === "g" && <RankPill info={ranks[it.a]} />}<span className="nm">{it.a}</span><span className="fg">{FLAG[it.a]}</span></span>
                    <span className="score">
                      <input inputMode="numeric" value={it.pa} onChange={(e) => set(it.id, sideA, e.target.value)} disabled={!editable} />
                      <span className="dash">–</span>
                      <input inputMode="numeric" value={it.pb} onChange={(e) => set(it.id, sideB, e.target.value)} disabled={!editable} />
                    </span>
                    <span className="tm"><span className="fg">{FLAG[it.b]}</span><span className="nm">{it.b}</span>{it.kind === "g" && <RankPill info={ranks[it.b]} />}</span>
                  </div>
                  <RealScore ra={ra} rb={rb} pa={it.pa} pb={it.pb} />
                </React.Fragment>
              );
            })}
          </div>
        );
      })}
      <SaveBar onSave={onSave} locked={locked} />
    </div>
  );
}

/* ----- Onglet PARCOURS : le pari global de phase finale (au démarrage) ----- */
function Parcours({ pred, setPred, results, onSave }) {
  const now = useNow();
  const locked = results?.locked;
  const runLocked = locked || now >= FIRST_KICKOFF - LOCK_MS;

  const togglePick = (round, team, max) => {
    if (runLocked) return;
    setPred((p) => {
      const cur = p.run[round] || [];
      let next;
      if (cur.includes(team)) next = cur.filter((t) => t !== team);
      else { if (cur.length >= max) return p; next = [...cur, team]; }
      return { ...p, run: { ...p.run, [round]: next } };
    });
  };
  const setChampion = (team) => {
    if (runLocked) return;
    setPred((p) => ({ ...p, run: { ...p.run, champion: team } }));
  };

  return (
    <div>
      <div className="sec-h"><h3>Le parcours final</h3><span className="n">pari du démarrage</span></div>
      <div className="pickhint" style={{ margin: "0 2px 10px" }}>Désigne les équipes qui iront loin dans le tableau. Ce pari global se fige au coup d'envoi du tournoi (11 juin).</div>
      <RunPicker pred={pred} togglePick={togglePick} setChampion={setChampion} locked={runLocked} />
      <SaveBar onSave={onSave} locked={runLocked} />
    </div>
  );
}

/* ----- Onglet FINALE : scores des matchs à élimination directe (au fil du tournoi) ----- */
function Finale({ pred, setPred, results, onSave }) {
  const now = useNow();
  const locked = results?.locked;
  const ko = results?.ko || {};

  const setKo = (id, side, val) => {
    const km = KO_BY_ID[id];
    const [ta, tb] = koTeams(id, ko);
    if (!ta || !tb || displayStatus(km, now, locked) !== "up") return;
    val = val.replace(/[^0-9]/g, "").slice(0, 2);
    setPred((p) => ({ ...p, ko: { ...p.ko, [id]: { ...(p.ko?.[id] || { sa: "", sb: "" }), [side]: val } } }));
  };

  const revealed = KNOCKOUT.filter((m) => { const [a, b] = koTeams(m.id, ko); return a && b; }).length;

  return (
    <div>
      {locked && <div className="warn">🔒 Les pronostics sont verrouillés par l'organisateur.</div>}
      <div className="sec-h"><h3>Tableau final</h3><span className="n">{revealed}/32 affiches</span></div>
      <div className="pickhint" style={{ margin: "0 2px 10px" }}>Les affiches s'affichent dès que l'organisateur connaît les qualifiés. Pronostique le score (prolongation / t.a.b. inclus). Fermeture 15 min avant le coup d'envoi.</div>

      {KO_ROUNDS.map(([rid, rlabel]) => {
        const ms = KNOCKOUT.filter((m) => m.round === rid);
        return (
          <div className="gblock" key={rid} style={{ padding: "4px 13px 10px" }}>
            <div className="ko-h">{rlabel}</div>
            {ms.map((m) => {
              const [ta, tb] = koTeams(m.id, ko);
              const teamsSet = ta && tb;
              const p = pred.ko?.[m.id] || { sa: "", sb: "" };
              const st = displayStatus(m, now, locked);
              const editable = teamsSet && st === "up";
              return (
                <React.Fragment key={m.id}>
                  <div className="match-meta"><span className="t">{fmtDate(m.date)}</span> · {m.time}<MatchBadge status={st} /></div>
                  {teamsSet ? (
                    <div className="match">
                      <span className="tm r"><span className="nm">{ta}</span><span className="fg">{FLAG[ta]}</span></span>
                      <span className="score">
                        <input inputMode="numeric" value={p.sa} onChange={(e) => setKo(m.id, "sa", e.target.value)} disabled={!editable} />
                        <span className="dash">–</span>
                        <input inputMode="numeric" value={p.sb} onChange={(e) => setKo(m.id, "sb", e.target.value)} disabled={!editable} />
                      </span>
                      <span className="tm"><span className="fg">{FLAG[tb]}</span><span className="nm">{tb}</span></span>
                    </div>
                  ) : (
                    <div className="ko-tbd">{m.label} · <span className="muted">affiche à venir</span></div>
                  )}
                </React.Fragment>
              );
            })}
          </div>
        );
      })}
      <SaveBar onSave={onSave} locked={locked} />
    </div>
  );
}

/* ----- Onglet TABLEAU : bracket final horizontal en lecture seule ----- */
// Les 2 équipes d'une affiche : saisies directement OU déduites du vainqueur des matchs nourriciers
function koScored(id, ko) { const k = ko[id] || {}; return k.sa !== "" && k.sa != null && k.sb !== "" && k.sb != null; }
function koTeams(id, ko) {
  const k = ko[id] || {};
  const f = KO_FEEDERS[id] || [];
  const a = k.a || (f[0] ? koWinner(f[0], ko) : "");
  const b = k.b || (f[1] ? koWinner(f[1], ko) : "");
  return [a, b];
}
function koWinner(id, ko) {
  const [a, b] = koTeams(id, ko); const k = ko[id] || {};
  if (!a || !b || !koScored(id, ko)) return "";
  return +k.sa > +k.sb ? a : (+k.sb > +k.sa ? b : "");
}
function koLoser(id, ko) {
  const [a, b] = koTeams(id, ko); const k = ko[id] || {};
  if (!a || !b || !koScored(id, ko)) return "";
  return +k.sa > +k.sb ? b : (+k.sb > +k.sa ? a : "");
}
// Une ligne d'équipe dans une affiche du bracket
function BkTeam({ team, slot, flag, score, win, side }) {
  if (!team) return <div className="bk-row tbd"><span className="bk-nm">{slot}</span></div>;
  return (
    <div className={"bk-row" + (win ? " win" : "") + (side === "b" ? " b" : "")}>
      <span className="bk-fl">{flag}</span>
      <span className="bk-nm">{team}</span>
      {score !== "" && score != null && <span className="bk-sc">{score}</span>}
    </div>
  );
}
// Une affiche (boîte) du bracket
function BkBox({ id, ko, pred, hasKids, isChild }) {
  const k = ko[id] || {};
  const [slotA, slotB] = KO_SLOTS[id] || ["", ""];
  const [a, b] = koTeams(id, ko);
  const scored = a && b && koScored(id, ko);
  const win = scored ? (+k.sa > +k.sb ? "a" : (+k.sb > +k.sa ? "b" : null)) : null;
  const p = pred.ko?.[id] || { sa: "", sb: "" };
  const filledP = p.sa !== "" && p.sa != null && p.sb !== "" && p.sb != null;
  let tag = null;
  if (scored && filledP) {
    const exact = +p.sa === +k.sa && +p.sb === +k.sb;
    const good = Math.sign(+p.sa - +p.sb) === Math.sign(+k.sa - +k.sb);
    tag = <span className={"bk-pred " + (exact ? "ok" : good ? "mid" : "ko")}>{exact ? "🎯" : good ? "✔" : "✘"} {p.sa}–{p.sb}</span>;
  } else if (filledP) {
    tag = <span className="bk-pred">prono {p.sa}–{p.sb}</span>;
  }
  return (
    <div className={"bk-box" + (hasKids ? " has-kids" : "") + (isChild ? " is-child" : "")}>
      <BkTeam team={a} slot={slotA} flag={FLAG[a]} score={scored ? k.sa : ""} win={win === "a"} side="a" />
      <BkTeam team={b} slot={slotB} flag={FLAG[b]} score={scored ? k.sb : ""} win={win === "b"} side="b" />
      {tag && <div className="bk-tag">{tag}</div>}
    </div>
  );
}
// Nœud récursif : enfants (gauche) -> affiche (droite)
function BkNode({ id, ko, pred, root }) {
  const kids = KO_FEEDERS[id] || [];
  return (
    <div className="bk-node">
      {kids.length > 0 && (
        <div className="bk-kids">
          {kids.map((kid) => <BkNode key={kid} id={kid} ko={ko} pred={pred} />)}
        </div>
      )}
      <BkBox id={id} ko={ko} pred={pred} hasKids={kids.length > 0} isChild={!root} />
    </div>
  );
}
function BracketFinal({ results, pred }) {
  const ko = results?.ko || {};
  const revealed = KNOCKOUT.filter((m) => { const [a, b] = koTeams(m.id, ko); return a && b; }).length;
  const champion = koWinner("K104", ko) || results?.run?.champion || "";
  const heads = ["Seizièmes", "Huitièmes", "Quarts", "Demi-finales", "Finale"];

  return (
    <div>
      <div className="sec-h"><h3>Tableau final</h3><span className="n">{revealed}/32 affiches</span></div>
      <div className="pickhint" style={{ margin: "0 2px 8px" }}>Lecture seule · vainqueur en vert · 🎯/✔/✘ = ton prono. Glisse horizontalement →</div>
      {champion && (
        <div className="champ-banner">🏆 <b>{FLAG[champion]} {champion}</b> — Champion du monde</div>
      )}
      <div className="bk-scroll">
        <div className="bk-inner">
          <div className="bk-heads">{heads.map((h) => <div className="bk-head" key={h}>{h}</div>)}</div>
          <BkNode id="K104" ko={ko} pred={pred} root />
        </div>
      </div>
      {(() => {
        const k = ko["K103"] || {};
        const slot = KO_SLOTS["K103"] || ["", ""];
        // 3e place : perdants des 2 demi-finales (K101, K102)
        const f = KO_FEEDERS["K103"] || [];
        const a = k.a || (f[0] ? koLoser(f[0], ko) : "");
        const b = k.b || (f[1] ? koLoser(f[1], ko) : "");
        const scored = a && b && koScored("K103", ko);
        const win = scored ? (+k.sa > +k.sb ? "a" : (+k.sb > +k.sa ? "b" : null)) : null;
        return (
          <div className="bk-tp">
            <div className="ko-h">Match pour la 3e place</div>
            <div className="bk-box">
              <BkTeam team={a} slot={slot[0]} flag={FLAG[a]} score={scored ? k.sa : ""} win={win === "a"} side="a" />
              <BkTeam team={b} slot={slot[1]} flag={FLAG[b]} score={scored ? k.sb : ""} win={win === "b"} side="b" />
            </div>
          </div>
        );
      })()}
    </div>
  );
}

/* ----- Onglet EN DIRECT : pronos des membres (révélés au verrouillage) ----- */
function Live({ code, meId, results }) {
  const [sub, setSub] = useState("matchs");
  const [players, setPlayers] = useState(null);
  const now = useNow();
  const locked = results?.locked;

  const load = useCallback(async () => {
    const pids = await store.listChildren(KEY.players(code));
    const ps = await Promise.all(pids.map((pid) => store.get(KEY.player(code, pid)).then((v) => ({ id: pid, name: v?.name, pred: normPred(v?.pred) }))));
    setPlayers(ps.filter((p) => p.name));
  }, [code]);
  useEffect(() => { load(); const iv = setInterval(load, 20000); return () => clearInterval(iv); }, [load]);

  return (
    <div>
      <div className="sec-h"><h3>Pronos du groupe</h3><button className="btn ghost sm" onClick={load}>↻ Actualiser</button></div>
      <div className="row" style={{ marginBottom: 12 }}>
        {[["matchs", "Matchs"], ["parcours", "Parcours"]].map(([id, lab]) => (
          <button key={id} className={"btn sm " + (sub === id ? "dark" : "ghost")} style={{ flex: 1 }} onClick={() => setSub(id)}>{lab}</button>
        ))}
      </div>
      {players === null ? <div className="empty">Chargement…</div> :
        sub === "matchs"
          ? <LiveMatches players={players} results={results} now={now} locked={locked} meId={meId} />
          : <LiveParcours players={players} results={results} now={now} locked={locked} meId={meId} />}
      <div style={{ height: 16 }} />
      <div className="note">Les pronos d'un match ne deviennent visibles qu'au <b>verrouillage</b> (15 min avant le coup d'envoi). Avant ça, ils restent secrets pour préserver l'équité.</div>
    </div>
  );
}

function LiveMatches({ players, results, now, locked, meId }) {
  const items = [];
  ALL_MATCHES.forEach((m) => {
    const st = displayStatus(m, now, locked);
    if (st === "up") return;
    items.push({ kind: "g", m, st, k: kickoffMs(m), a: m.a, b: m.b, res: results.matches?.[m.id] });
  });
  KNOCKOUT.forEach((m) => {
    const [ta, tb] = koTeams(m.id, results.ko || {});
    if (!ta || !tb) return;
    const k = results.ko?.[m.id] || {};
    const st = displayStatus(m, now, locked);
    if (st === "up") return;
    items.push({ kind: "k", m, st, k: kickoffMs(m), a: ta, b: tb, res: { a: k.sa, b: k.sb } });
  });
  if (!items.length)
    return <div className="empty">Aucun match verrouillé pour l'instant.<br />Les pronos de chacun apparaissent 15 min avant le coup d'envoi de chaque match.</div>;

  const order = { live: 0, closed: 1, past: 2 };
  items.sort((x, y) => (order[x.st] - order[y.st]) || (x.st === "past" ? y.k - x.k : x.k - y.k));

  return (
    <div>
      {items.map((it) => {
        const m = it.m, res = it.res;
        const hasRes = res && res.a !== "" && res.a != null && res.b !== "" && res.b != null;
        return (
          <div className="live-match" key={it.kind + m.id}>
            <div className="live-head">
              <span className="live-teams"><span>{FLAG[it.a]} {it.a}</span><span className="vs">vs</span><span>{FLAG[it.b]} {it.b}</span></span>
              <span className="live-res">{hasRes ? `${res.a}–${res.b}` : <span className="tbd">à jouer</span>}</span>
            </div>
            <div className="match-meta" style={{ textAlign: "left", paddingTop: 0 }}><span className="t">{fmtDate(m.date)}</span> · {m.time}<MatchBadge status={it.st} /></div>
            {players.map((p) => {
              const pr = it.kind === "g" ? p.pred.matches?.[m.id] : p.pred.ko?.[m.id];
              const pa = it.kind === "g" ? pr?.a : pr?.sa;
              const pb = it.kind === "g" ? pr?.b : pr?.sb;
              const has = pa !== undefined && pa !== "" && pb !== undefined && pb !== "";
              let tag = null;
              if (has && hasRes) {
                if (+pa === +res.a && +pb === +res.b) tag = <span className="pred-tag ex">exact</span>;
                else if (sign(+pa - +pb) === sign(+res.a - +res.b)) tag = <span className="pred-tag ok">bon résultat</span>;
              }
              return (
                <div className="pred-row" key={p.id}>
                  <span className={"pn" + (p.id === meId ? " me" : "")}>{p.name}{p.id === meId ? " (toi)" : ""}</span>
                  <span className="pred-score">{has ? `${pa} – ${pb}` : <span className="dash-sm">pas de prono</span>}{tag}</span>
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

function LiveParcours({ players, results, now, locked, meId }) {
  const revealed = locked || now >= FIRST_KICKOFF - LOCK_MS;
  if (!revealed)
    return <div className="empty">Le parcours de chacun reste secret jusqu'au coup d'envoi du tournoi (11 juin).<br />Il s'affichera ici dès le début de la compétition.</div>;
  const rr = results.run || {};
  const hit = (arr, t) => (arr || []).includes(t);
  const chip = (t, on) => <span className={"pc-chip" + (on ? " hit" : "")} key={t}><span>{FLAG[t]}</span>{t}</span>;
  const stage = (label, arr, real) => (
    <div className="pc-row">
      <div className="pc-lab">{label}</div>

    </div>

            {stage("Finalistes", run.finaliste, rr.finaliste)}

          </div>
        );
      })}

}

/* ----- Onglet TOURNOI : résultats par jour + classement des groupes ----- */
function groupStandings(L, results) {
  const ms = groupMatches(L);
  const teams = {};
  const ensure = (t) => { if (!teams[t]) teams[t] = { team: t, J: 0, G: 0, N: 0, P: 0, bp: 0, bc: 0, pts: 0 }; return teams[t]; };
  ms.forEach((m) => {
    const ta = ensure(m.a), tb = ensure(m.b);
    const r = results.matches?.[m.id];
    if (!r || r.a === "" || r.a == null || r.b === "" || r.b == null) return;
    const a = +r.a, b = +r.b;
    ta.J++; tb.J++; ta.bp += a; ta.bc += b; tb.bp += b; tb.bc += a;
    if (a > b) { ta.G++; tb.P++; ta.pts += 3; }
    else if (a < b) { tb.G++; ta.P++; tb.pts += 3; }
    else { ta.N++; tb.N++; ta.pts++; tb.pts++; }
  });
  return Object.values(teams).map((t) => ({ ...t, diff: t.bp - t.bc }))
    .sort((x, y) => y.pts - x.pts || y.diff - x.diff || y.bp - x.bp || x.team.localeCompare(y.team));
}

function Tournoi({ results }) {
  const [sub, setSub] = useState("resultats");
  return (
    <div>
      <div className="sec-h"><h3>Le tournoi</h3></div>
      <div className="row" style={{ marginBottom: 12 }}>
        {[["resultats", "Résultats par jour"], ["groupes", "Classement des groupes"]].map(([id, lab]) => (
          <button key={id} className={"btn sm " + (sub === id ? "dark" : "ghost")} style={{ flex: 1 }} onClick={() => setSub(id)}>{lab}</button>
        ))}
      </div>
      {sub === "resultats" ? <ResultatsParJour results={results} /> : <ClassementGroupes results={results} />}
    </div>
  );
}

function ResultatsParJour({ results }) {
  const done = (r) => r && r.a !== "" && r.a != null && r.b !== "" && r.b != null;
  const items = [];
  ALL_MATCHES.forEach((m) => items.push({ k: kickoffMs(m), date: m.date, time: m.time, a: m.a, b: m.b, r: results.matches?.[m.id] }));
  KNOCKOUT.forEach((m) => { const [ta, tb] = koTeams(m.id, results.ko || {}); if (!ta || !tb) return; const t = results.ko?.[m.id] || {}; items.push({ k: kickoffMs(m), date: m.date, time: m.time, a: ta, b: tb, r: { a: t.sa, b: t.sb }, ko: true }); });
  items.sort((x, y) => x.k - y.k);
  const days = []; const byK = {};
  items.forEach((it) => { if (!byK[it.date]) { byK[it.date] = { date: it.date, list: [] }; days.push(byK[it.date]); } byK[it.date].list.push(it); });
  return (
    <div>
      {days.map((d) => {
        const played = d.list.filter((it) => done(it.r)).length;
        return (
          <div className="gblock" key={d.date} style={{ padding: "4px 13px 10px" }}>
            <div className="ko-h">{fmtDate(d.date)} <span style={{ color: "var(--mut)", fontFamily: "Inter", fontWeight: 600, fontSize: 12 }}>· {played}/{d.list.length} joués</span></div>
            {d.list.map((it, i) => (
              <div className="oline" key={i}>
                <span className="oline-t"><span className="fg">{FLAG[it.a] || ""}</span><span className="nm">{it.a} – {it.b}</span><span className="fg">{FLAG[it.b] || ""}</span>{it.ko && <span className="pred-tag ok" style={{ marginLeft: 6 }}>finale</span>}</span>
                <span className="live-res">{done(it.r) ? `${it.r.a}–${it.r.b}` : <span className="tbd">{it.time}</span>}</span>
              </div>
            ))}
          </div>
        );
      })}
      <div style={{ height: 12 }} />
      <div className="note">Scores officiels saisis par l'organisateur (ou récupérés automatiquement). Les matchs non joués affichent l'heure du coup d'envoi.</div>
    </div>
  );
}

function ClassementGroupes({ results }) {
  return (
    <div>
      {LETTERS.map((L, gi) => {
        const table = groupStandings(L, results);
        const played = groupMatches(L).filter((m) => { const r = results.matches?.[m.id]; return r && r.a !== "" && r.a != null && r.b !== "" && r.b != null; }).length;
        return (

function Classement({ code, meId, rules, results }) {
  const [rows, setRows] = useState(null);
  const lbKey = "wc26:lbmove:" + code;
  const sigOf = (r) => {
    let s = "";
    Object.keys(r.matches || {}).sort().forEach((k) => { const m = r.matches[k]; s += k + m.a + "_" + m.b + ";"; });
    Object.keys(r.ko || {}).sort().forEach((k) => { const m = r.ko[k]; s += k + m.sa + "_" + m.sb + ";"; });
    const run = r.run || {};
    s += "R" + (run.champion || "") + (run.finaliste || []).join() + (run.demi || []).join() + (run.quart || []).join();
    return s;
  };

  const load = useCallback(async () => {
    const pids = await store.listChildren(KEY.players(code));
    const players = await Promise.all(pids.map((pid) => store.get(KEY.player(code, pid)).then((v) => ({ id: pid, ...(v || {}) }))));
    const scored = players.filter((p) => p && p.name).map((p) => {
      const s = scorePlayer(p.pred || emptyPred(), results, rules);
      return { id: p.id, name: p.name, ...s };
    }).sort((a, b) => b.total - a.total || b.exact - a.exact);
    const curRanks = {}; scored.forEach((r, i) => { curRanks[r.id] = i; });
    const ver = sigOf(results);
    let stored = null; try { stored = JSON.parse(localStorage.getItem(lbKey) || "null"); } catch (e) {}
    let base;
    if (!stored) { base = curRanks; stored = { ver, cur: curRanks, prev: curRanks }; }
    else if (stored.ver === ver) { base = stored.prev || stored.cur || curRanks; stored.cur = curRanks; }
    else { base = stored.cur || curRanks; stored = { ver, cur: curRanks, prev: stored.cur || curRanks }; }
    try { localStorage.setItem(lbKey, JSON.stringify(stored)); } catch (e) {}
    const withDelta = scored.map((r, i) => ({ ...r, delta: base[r.id] != null ? base[r.id] - i : null }));
    setRows(withDelta);
  }, [code, results, rules]);

  useEffect(() => { load(); const iv = setInterval(load, 15000); return () => clearInterval(iv); }, [load]);

  const hasResults = results && (Object.keys(results.matches || {}).length || Object.keys(results.ko || {}).length || results.run?.champion);

  return (
    <div>
      <div className="sec-h">
        <h3>Classement du groupe</h3>
        <button className="btn ghost sm" onClick={load}>↻ Actualiser</button>
      </div>
      {!hasResults && (
        <div className="warn">Aucun résultat saisi pour l'instant — le classement passera à zéro jusqu'au coup d'envoi. Les points tombent dès que l'organisateur entre les scores.</div>
      )}
      {rows === null ? <div className="empty">Calcul du classement…</div> :
        rows.length === 0 ? <div className="empty">Personne n'a encore rejoint le groupe.<br />Partage le code pour lancer la partie.</div> :
          <div className="lb">
            {rows.map((r, i) => (
              <div className="lbrow" key={r.id}>
                <span className="rankwrap">
                  <span className={"rank" + (i === 0 ? " r1" : i === 1 ? " r2" : i === 2 ? " r3" : "")}>{i + 1}</span>
                  {r.delta != null && (
                    r.delta > 0 ? <span className="mvt up">▲{r.delta}</span>
                      : r.delta < 0 ? <span className="mvt down">▼{Math.abs(r.delta)}</span>
                        : <span className="mvt same">=</span>
                  )}
                </span>
                <span style={{ flex: 1 }}>
                  <div className={"lbname" + (r.id === meId ? " me" : "")}>
                    {r.name}{r.id === meId && <span className="tagme">toi</span>}
                  </div>
                  <div className="lbsub">{r.exact} scores exacts · {r.results} bons résultats · {r.run} pts parcours</div>
                </span>
                <span className="pts">{r.total}<small>points</small></span>
              </div>
            ))}
          </div>}
      <div style={{ height: 16 }} />
      <div className="note">
        Le classement se met à jour automatiquement (toutes les 15 s). La flèche indique les places gagnées (▲ vert) ou perdues (▼ rose) <b>depuis la dernière mise à jour des résultats</b> ; elle reste affichée jusqu'au prochain résultat.
      </div>
    </div>
  );
}

/* ----- Onglet COTES (admin) : cotes des bookmakers via The Odds API ----- */
const EN = { "Mexique": "Mexico", "Afrique du Sud": "South Africa", "Corée du Sud": "South Korea", "Tchéquie": "Czechia", "Canada": "Canada", "Bosnie-Herz.": "Bosnia and Herzegovina", "Qatar": "Qatar", "Suisse": "Switzerland", "Brésil": "Brazil", "Maroc": "Morocco", "Haïti": "Haiti", "Écosse": "Scotland", "États-Unis": "USA", "Paraguay": "Paraguay", "Australie": "Australia", "Turquie": "Turkey", "Allemagne": "Germany", "Curaçao": "Curacao", "Côte d'Ivoire": "Ivory Coast", "Équateur": "Ecuador", "Pays-Bas": "Netherlands", "Japon": "Japan", "Suède": "Sweden", "Tunisie": "Tunisia", "Belgique": "Belgium", "Égypte": "Egypt", "Iran": "Iran", "Nouvelle-Zélande": "New Zealand", "Espagne": "Spain", "Cap-Vert": "Cape Verde", "Arabie saoudite": "Saudi Arabia", "Uruguay": "Uruguay", "France": "France", "Sénégal": "Senegal", "RD Congo": "DR Congo", "Norvège": "Norway", "Argentine": "Argentina", "Algérie": "Algeria", "Autriche": "Austria", "Jordanie": "Jordan", "Portugal": "Portugal", "Colombie": "Colombia", "Ouzbékistan": "Uzbekistan", "Irak": "Iraq", "Angleterre": "England", "Croatie": "Croatia", "Ghana": "Ghana", "Panama": "Panama" };
const norm = (s) => (s || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]/g, "");
const teamEq = (fr, apiName) => { const a = norm(EN[fr] || fr), b = norm(apiName); if (!a || !b) return false; return a === b || b.includes(a) || a.includes(b); };

/* ----- Joueur IA « Claude » : pronos générés selon la force des équipes ----- */
const STRENGTH = { "France": 93, "Argentine": 93, "Espagne": 92, "Brésil": 91, "Angleterre": 90, "Portugal": 89, "Allemagne": 88, "Pays-Bas": 87, "Belgique": 84, "Croatie": 83, "Uruguay": 83, "Colombie": 82, "Maroc": 82, "Norvège": 81, "Suisse": 80, "États-Unis": 80, "Japon": 80, "Sénégal": 79, "Mexique": 79, "Autriche": 79, "Corée du Sud": 78, "Suède": 78, "Turquie": 78, "Côte d'Ivoire": 77, "Équateur": 77, "Égypte": 77, "Iran": 76, "Tchéquie": 76, "Algérie": 76, "Écosse": 75, "Canada": 75, "Bosnie-Herz.": 75, "Australie": 74, "Paraguay": 74, "Ghana": 74, "RD Congo": 73, "Tunisie": 73, "Qatar": 72, "Arabie saoudite": 71, "Afrique du Sud": 70, "Panama": 70, "Ouzbékistan": 70, "Irak": 69, "Jordanie": 68, "Cap-Vert": 68, "Curaçao": 66, "Nouvelle-Zélande": 66, "Haïti": 64 };
const stOf = (t) => STRENGTH[t] || 70;
const predictScore = (a, b) => {
  const sa = stOf(a), sb = stOf(b), d = sa - sb, ad = Math.abs(d);
  const baseFor = (s) => Math.max(0, Math.min(4, Math.round((s - 60) / 13)));
  let ga = baseFor(sa), gb = baseFor(sb);
  if (ad <= 3) { const v = Math.max(1, Math.min(ga, gb) || 1); ga = v; gb = v; }
  else if (d > 0) ga = Math.max(ga, gb + (ad > 12 ? 3 : ad > 6 ? 2 : 1));
  else gb = Math.max(gb, ga + (ad > 12 ? 3 : ad > 6 ? 2 : 1));
  return [String(Math.min(ga, 5)), String(Math.min(gb, 5))];
};
const CLAUDE_RUN = {
  quart: ["France", "Argentine", "Espagne", "Brésil", "Angleterre", "Portugal", "Allemagne", "Pays-Bas"],
  demi: ["France", "Argentine", "Espagne", "Brésil"],
  finaliste: ["France", "Argentine"],
  champion: "France",
};

function oddsForEvent(ev, a, b) {
  const acc = { "1": [], "N": [], "2": [] };
  const best = { "1": { p: 0, bk: "" }, "N": { p: 0, bk: "" }, "2": { p: 0, bk: "" } };
  (ev.bookmakers || []).forEach((bk) => {
    const m = (bk.markets || []).find((x) => x.key === "h2h"); if (!m) return;
    (m.outcomes || []).forEach((o) => {
      let cat = null;
      if (o.name === "Draw") cat = "N";
      else if (teamEq(a, o.name)) cat = "1";
      else if (teamEq(b, o.name)) cat = "2";
      if (!cat) return;
      acc[cat].push(o.price);
      if (o.price > best[cat].p) best[cat] = { p: o.price, bk: bk.title };
    });
  });
  const avg = (arr) => (arr.length ? arr.reduce((s, x) => s + x, 0) / arr.length : null);
  return { count: (ev.bookmakers || []).length, one: avg(acc["1"]), nul: avg(acc["N"]), two: avg(acc["2"]), best };
}

function Cotes({ results }) {
  const [data, setData] = useState(null);
  const [status, setStatus] = useState("idle");
  const [err, setErr] = useState("");
  const [viewMode, setViewMode] = useState("groupe");
  const configured = ODDS_API_KEY && !ODDS_API_KEY.includes("A_REMPLIR");

  const fetchOdds = useCallback(async (force) => {
    if (!configured) { setStatus("nokey"); return; }
    let cached = null;
    try { cached = JSON.parse(localStorage.getItem("wc26:odds") || "null"); } catch (e) {}
    if (!force && cached && Date.now() - cached.fetchedAt < 30 * 60 * 1000) { setData(cached); setStatus("ok"); return; }
    setStatus("loading"); setErr("");
    try {
      const sportsRes = await fetch(`https://api.the-odds-api.com/v4/sports/?apiKey=${ODDS_API_KEY}`);
      if (!sportsRes.ok) throw new Error(sportsRes.status === 401 ? "Clé invalide." : `Erreur ${sportsRes.status} (quota ?).`);
      const sports = await sportsRes.json();
      const wc = sports.find((s) => /soccer/i.test(s.key) && /world cup/i.test(s.title)) || sports.find((s) => /fifa.*world.*cup/i.test(s.key));
      if (!wc) { const p = { events: [], remaining: null, fetchedAt: Date.now(), noEvent: true }; try { localStorage.setItem("wc26:odds", JSON.stringify(p)); } catch (e) {} setData(p); setStatus("ok"); return; }
      const oddsRes = await fetch(`https://api.the-odds-api.com/v4/sports/${wc.key}/odds/?apiKey=${ODDS_API_KEY}&regions=eu&markets=h2h&oddsFormat=decimal`);
      if (!oddsRes.ok) throw new Error(`Erreur cotes ${oddsRes.status}.`);
      const remaining = oddsRes.headers.get("x-requests-remaining");
      const events = await oddsRes.json();
      const p = { events, remaining, fetchedAt: Date.now(), sport: wc.key };
      try { localStorage.setItem("wc26:odds", JSON.stringify(p)); } catch (e) {}
      setData(p); setStatus("ok");
    } catch (e) { setErr(e.message || String(e)); setStatus("error"); }
  }, [configured]);

  useEffect(() => { fetchOdds(false); }, [fetchOdds]);

  if (!configured)
    return (
      <div>
        <div className="sec-h"><h3>Cotes</h3></div>
        <div className="note">Pour afficher les cotes, ouvre le fichier <b>index.html</b> et colle ta clé gratuite <b>The Odds API</b> (the-odds-api.com) dans <code>ODDS_API_KEY</code>, puis recommite et recharge.</div>
      </div>
    );

  const now = Date.now();
  const events = (data && data.events) || [];
  const used = new Set();
  const rows = [];
  const isoOf = (d) => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
  const fixtures = [];
  ALL_MATCHES.forEach((m) => { if (kickoffMs(m) > now) fixtures.push({ group: m.group, a: m.a, b: m.b, date: m.date, time: m.time, k: kickoffMs(m) }); });
  KNOCKOUT.forEach((m) => { const [ta, tb] = koTeams(m.id, results.ko || {}); if (ta && tb && kickoffMs(m) > now) fixtures.push({ group: "KO", a: ta, b: tb, date: m.date, time: m.time, k: kickoffMs(m) }); });
  fixtures.sort((x, y) => x.k - y.k);
  fixtures.forEach((fx) => {
    const ev = events.find((e) => !used.has(e.id) && ((teamEq(fx.a, e.home_team) && teamEq(fx.b, e.away_team)) || (teamEq(fx.a, e.away_team) && teamEq(fx.b, e.home_team))));
    if (ev) { used.add(ev.id); rows.push({ ...fx, o: oddsForEvent(ev, fx.a, fx.b) }); }
  });
  events.filter((e) => !used.has(e.id) && new Date(e.commence_time).getTime() > now).forEach((e) => {
    const d = new Date(e.commence_time);
    rows.push({ group: "KO", a: e.home_team, b: e.away_team, date: isoOf(d), time: d.toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" }), k: d.getTime(), o: oddsForEvent(e, e.home_team, e.away_team) });
  });

  let sections = [];
  if (viewMode === "groupe") {
    LETTERS.forEach((L, i) => { const list = rows.filter((r) => r.group === L).sort((a, b) => a.k - b.k); if (list.length) sections.push({ key: L, chip: L, color: GCOL[i], label: `Groupe ${L}`, list }); });
    const ko = rows.filter((r) => r.group === "KO").sort((a, b) => a.k - b.k);
    if (ko.length) sections.push({ key: "KO", chip: "🏆", color: "#0d1330", label: "Tableau final", list: ko });
  } else {
    const byKey = {}; const order = [];
    rows.slice().sort((a, b) => a.k - b.k).forEach((r) => { if (!byKey[r.date]) { byKey[r.date] = { key: r.date, chip: r.date.split("-")[2], color: "#0d1330", label: fmtDate(r.date), list: [] }; order.push(byKey[r.date]); } byKey[r.date].list.push(r); });
    sections = order;
  }

  return (
    <div>
      <div className="sec-h">
        <h3>Cotes des bookmakers</h3>
        <button className="btn ghost sm" onClick={() => fetchOdds(true)}>↻ Actualiser</button>
      </div>
      <div className="row" style={{ marginBottom: 10 }}>
        <button className={"btn sm " + (viewMode === "groupe" ? "dark" : "ghost")} style={{ flex: 1 }} onClick={() => setViewMode("groupe")}>Par groupe</button>
        <button className={"btn sm " + (viewMode === "jour" ? "dark" : "ghost")} style={{ flex: 1 }} onClick={() => setViewMode("jour")}>Par jour</button>
      </div>
      <div className="pickhint" style={{ margin: "0 2px 10px" }}>
        Cotes moyennes (1 · nul · 2) via The Odds API.
        {data && data.fetchedAt ? ` Maj : ${new Date(data.fetchedAt).toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" })}.` : ""}
        {data && data.remaining != null ? ` Crédits : ${data.remaining}.` : ""}
      </div>

      {status === "loading" && <div className="empty">Chargement des cotes…</div>}
      {status === "error" && <div className="warn">Impossible de récupérer les cotes : {err}<br />Vérifie ta clé / ton quota, puis ↻ Actualiser.</div>}
      {status === "ok" && sections.length === 0 && (
        <div className="empty">Aucune cote publiée pour l'instant.<br />Les bookmakers publient les cotes à l'approche des matchs — reviens plus tard.</div>
      )}

      {sections.map((s, idx) => (
        <details className="gblock" key={s.key} open={idx === 0}>
          <summary>
            <span className="gletter" style={{ background: s.color }}>{s.chip}</span>
            <span className="gsum-t">
              <span className="gt">{s.label}</span>
              <span className="gm">{s.list.length} match{s.list.length > 1 ? "s" : ""} coté{s.list.length > 1 ? "s" : ""}</span>
            </span>
            <span className="chev">▸</span>
          </summary>
          <div className="gbody">
            <div className="oline-h"><span>1</span><span>N</span><span>2</span></div>
            {s.list.map((r, i) => <OddsLine key={i} r={r} />)}
          </div>
        </details>
      ))}

      <div style={{ height: 16 }} />
      <div className="note">Cotes fournies à titre informatif par un agrégateur. Joue de manière responsable.</div>
    </div>
  );
}
